<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const debug = document.getElementById('debug');

    canvas.width = 1080;
    canvas.height = 1920;

    debug.textContent = "CATETIC OS starting on GitHub...";

    // Assets with error handling
    const images = {};
    const assetFiles = {
        menu: 'IMG_9002.png',
        battle: 'IMG_9005.png',
        glasses: 'IMG_8681.png',
        lounge1: 'IMG_9053.png',
        qrCat: 'IMG_9049.png',
        lounge2: 'IMG_9054.png',
        keypad: 'IMG_9058.png',
        gameroom: 'IMG_9044.png',
        victory: 'IMG_victory.png'   // ← change to your victory lounge filename
    };

    let loadedCount = 0;
    const total = Object.keys(assetFiles).length;

    Object.keys(assetFiles).forEach(key => {
        images[key] = new Image();
        images[key].onload = () => { loadedCount++; debug.textContent = `Loaded ${loadedCount}/${total}`; };
        images[key].onerror = () => { 
            console.error("Missing:", assetFiles[key]); 
            loadedCount++; 
        };
        images[key].src = assetFiles[key];
    });

    let gameState = "MENU";

    function gameLoop() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (loadedCount < total) {
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 70px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("CATETIC", 540, 800);
            ctx.font = "40px Courier New";
            ctx.fillText("LOADING ASSETS...", 540, 950);
        } else if (gameState === "MENU" && images.menu) {
            ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 80px Courier New";
            ctx.fillText("CATETIC OS", 540, 900);
            ctx.font = "40px Courier New";
            ctx.fillText("TAP SCREEN", 540, 1100);
        }

        requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('touchstart', () => { debug.textContent = "Touch registered!"; });
    canvas.addEventListener('click', () => { debug.textContent = "Click registered!"; });

    requestAnimationFrame(gameLoop);
</script>
