<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC OS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9 / 16;
            box-shadow: 0 0 20px rgba(0, 255, 70, 0.3);
        }
        #catVideo {
            display: none;
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 10;
        }
        #debug {
            position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 14px;
            background: rgba(0,0,0,0.7); padding: 5px; z-index: 100;
        }
    </style>
</head>
<body>

    <video id="catVideo" loop playsinline src="1775353548457063.mp4"></video>
    <canvas id="gameCanvas"></canvas>
    <div id="debug">Loading CATETIC OS...</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('catVideo');
    const debug = document.getElementById('debug');

    canvas.width = 1080;
    canvas.height = 1920;

    debug.textContent = "Canvas initialized...";

    // Sound
    const bgMusic = new Audio('Intro_music.m4a');
    bgMusic.loop = true;
    let musicPlaying = false;

    function toggleMusicSystem() {
        if (musicPlaying) bgMusic.pause();
        else bgMusic.play().catch(() => {});
        musicPlaying = !musicPlaying;
    }

    // Assets
    const images = {};
    const assetFiles = {
        menu: 'IMG_9002.png',
        battle: 'IMG_9005.png',
        glasses: 'IMG_8681.png',
        lounge1: 'IMG_9053.png',
        qrCat: 'IMG_9049.png',
        lounge2: 'IMG_9054.png',
        keypad: 'IMG_9058.png',
        gameroom: 'IMG_9044.png'
    };

    let loadedCount = 0;
    let totalAssets = Object.keys(assetFiles).length;

    debug.textContent = `Loading ${totalAssets} images...`;

    Object.keys(assetFiles).forEach(key => {
        images[key] = new Image();
        images[key].onload = () => {
            loadedCount++;
            debug.textContent = `Loaded ${loadedCount}/${totalAssets} images`;
            if (loadedCount === totalAssets) {
                debug.textContent = "All assets loaded ✓ Starting game...";
                setTimeout(() => { debug.style.display = "none"; }, 1500);
                requestAnimationFrame(gameLoop);
            }
        };
        images[key].onerror = () => {
            debug.textContent = `ERROR: Missing image -> ${assetFiles[key]}`;
            console.error("Missing image:", assetFiles[key]);
        };
        images[key].src = assetFiles[key];
    });

    // Game Variables
    let gameState = "MENU";
    let toastMessage = "", toastTimer = 0;
    let inputCode = "";
    const masterPassword = "7777777";

    let typeProgress = 0;
    let lastTypeTime = 0;
    let rulesFinished = false;

    const rulesText = [ /* same as before */ 
        "THE CATETIC SIMULATION IS UNSTABLE.",
        "",
        "--- CHOOSE YOUR ALIGNMENT ---",
        "🔵 SAMURAI CAT (LEFT): THE BLUE PILL PATH.",
        "   FIGHT FOR FREEDOM WITH ONE FAST ATTACK.",
        "   SURPASS 6 CLICKS PER SECOND TO BREAK OUT.",
        "",
        "🔴 NINJA CAT (RIGHT): THE RED PILL TRAP.",
        "   RIGGED BY THE ARCHITECT. CHOOSING THIS",
        "   SIDE LEADS TO COMPLETE CRASH.",
        "",
        "WARNING: ONCE 'DRINK WATER' IS PRESSED,",
        "THE SYSTEM WILL INJECT 150 BPM CHAOS.",
        "THERE IS NO WAY BACK.",
        "",
        "-> TAP ANYWHERE TO EXIT TERMINAL _"
    ];

    function gameLoop() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === "MENU") {
            if (images.menu) ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);
            else {
                ctx.fillStyle = "#00ff46";
                ctx.font = "bold 60px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("CATETIC OS", 540, 800);
            }
        } 
        else if (gameState === "RULES") {
            // Terminal look
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#00ff46";
            ctx.lineWidth = 14;
            ctx.strokeRect(70, 110, 940, 1700);

            ctx.fillStyle = "#00ff46";
            ctx.font = "32px Courier New";
            ctx.textAlign = "left";

            const now = Date.now();
            if (!rulesFinished && now - lastTypeTime > 40) {
                typeProgress++;
                lastTypeTime = now;
            }

            const full = rulesText.join("\n");
            const visible = full.substring(0, typeProgress);
            const lines = visible.split("\n");

            let y = 190;
            for (let line of lines) {
                ctx.fillText(line, 130, y);
                y += 52;
            }

            if (rulesFinished || Math.floor(Date.now()/400)%2 === 0) {
                const lastLine = lines[lines.length-1] || "";
                ctx.fillText("█", 130 + ctx.measureText(lastLine).width + 5, y - 5);
            }

            if (typeProgress >= full.length) rulesFinished = true;
        } 
        // Add other states as fallback (drawing black if image missing)
        else {
            if (images[gameState.toLowerCase()]) {
                ctx.drawImage(images[gameState.toLowerCase()], 0, 0, canvas.width, canvas.height);
            }
        }

        requestAnimationFrame(gameLoop);
    }

    // Click handler (simplified for now)
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * canvas.width;
        const y = ((e.clientY - rect.top) / rect.height) * canvas.height;

        if (gameState === "MENU") {
            if (y > 1400) gameState = "RULES";   // Tap bottom to go to rules
        } else if (gameState === "RULES") {
            gameState = "MENU";
            typeProgress = 0;
            rulesFinished = false;
        }
    });

    // Keep adding your other functions here if needed
</script>
</body>
</html>
