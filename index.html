<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('catVideo');

    canvas.width = 1080;
    canvas.height = 1920;

    // --- SOUND ---
    const bgMusic = new Audio('Intro_music.m4a');
    bgMusic.loop = true;
    let musicPlaying = false;

    function toggleMusicSystem() {
        if (musicPlaying) {
            bgMusic.pause();
            musicPlaying = false;
        } else {
            bgMusic.play().catch(() => {});
            musicPlaying = true;
        }
    }

    // --- ASSETS ---
    const images = {};
    const assetFiles = {
        menu: 'IMG_9002.png',
        battle: 'IMG_9005.png',
        glasses: 'IMG_8681.png',
        lounge1: 'IMG_9053.png',
        qrCat: 'IMG_9049.png',
        lounge2: 'IMG_9054.png',
        keypad: 'IMG_9058.png',
        gameroom: 'IMG_9044.png'
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(assetFiles).length;

    Object.keys(assetFiles).forEach(key => {
        images[key] = new Image();
        images[key].src = assetFiles[key];
        images[key].onload = () => {
            loadedCount++;
            if (loadedCount === totalAssets) {
                requestAnimationFrame(gameLoop);
            }
        };
    });

    // --- GAME STATE ---
    let gameState = "MENU";
    let toastMessage = "";
    let toastTimer = 0;
    let inputCode = "";
    const masterPassword = "7777777";
    let typeProgress = 0;
    let lastTypeTime = 0;

    const rulesText = [
        "THE CATETIC SIMULATION IS UNSTABLE.",
        "",
        "--- CHOOSE YOUR ALIGNMENT ---",
        "🔵 SAMURAI CAT (LEFT): THE BLUE PILL PATH.",
        "   FIGHT FOR FREEDOM WITH ONE FAST ATTACK.",
        "   SURPASS 6 CLICKS PER SECOND TO BREAK OUT.",
        "",
        "🔴 NINJA CAT (RIGHT): THE RED PILL TRAP.",
        "   RIGGED BY THE ARCHITECT. CHOOSING THIS",
        "   SIDE LEADS TO COMPLETE CRASH.",
        "",
        "WARNING: ONCE 'DRINK WATER' IS PRESSED,",
        "THE SYSTEM WILL INJECT 150 BPM CHAOS.",
        "THERE IS NO WAY BACK.",
        "",
        "-> TAP ANYWHERE TO EXIT TERMINAL _"
    ];

    // --- MAIN GAME LOOP ---
    function gameLoop() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === "MENU") {
            if (images.menu) ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 40px 'Courier New', monospace";
            ctx.textAlign = "left";
            ctx.fillText("RULES", 50, 1470);

            ctx.fillStyle = musicPlaying ? "rgba(0, 255, 70, 0.8)" : "rgba(255, 26, 26, 0.8)";
            ctx.textAlign = "center";
            ctx.fillText(musicPlaying ? " 🟢 " : " 🛑 ", 970, 1470);
            ctx.textAlign = "left";

        } 
        else if (gameState === "RULES") {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ff46";
            ctx.font = "32px 'Courier New', monospace";
            ctx.textAlign = "left";

            const currentTime = Date.now();
            if (currentTime - lastTypeTime > 30) {
                typeProgress++;
                lastTypeTime = currentTime;
            }

            const fullText = rulesText.join("\n");
            const visibleText = fullText.substring(0, typeProgress);
            const lines = visibleText.split("\n");

            let y = 200;
            const lineHeight = 50;
            for (let line of lines) {
                ctx.fillText(line, 50, y);
                y += lineHeight;
            }
        } 
        else if (gameState === "BATTLE" && images.battle) ctx.drawImage(images.battle, 0, 0, canvas.width, canvas.height);
        else if (gameState === "GLASSES_CAT" && images.glasses) ctx.drawImage(images.glasses, 0, 0, canvas.width, canvas.height);
        else if (gameState === "VIP_LOUNGE_1" && images.lounge1) ctx.drawImage(images.lounge1, 0, 0, canvas.width, canvas.height);
        else if (gameState === "QR_CAT" && images.qrCat) ctx.drawImage(images.qrCat, 0, 0, canvas.width, canvas.height);
        else if (gameState === "VIP_LOUNGE_2" && images.lounge2) ctx.drawImage(images.lounge2, 0, 0, canvas.width, canvas.height);
        else if (gameState === "KEYPAD" && images.keypad) {
            ctx.drawImage(images.keypad, 0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff1a1a";
            ctx.font = "bold 100px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(inputCode || "CLOSED", 540, 320);
            ctx.textAlign = "left";
        } 
        else if (gameState === "GAME_ROOM" && images.gameroom) ctx.drawImage(images.gameroom, 0, 0, canvas.width, canvas.height);

        // Toast
        if (toastTimer > 0) {
            ctx.fillStyle = "rgba(0, 255, 70, 0.9)";
            ctx.fillRect(240, 80, 600, 100);
            ctx.fillStyle = "#000";
            ctx.font = "bold 32px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(toastMessage, 540, 142);
            ctx.textAlign = "left";
            toastTimer--;
        }

        requestAnimationFrame(gameLoop);
    }

    // Click handler stays almost the same (only small fixes)
    canvas.addEventListener('click', function(e) {
        if (!musicPlaying && gameState === "MENU") {
            bgMusic.play().catch(() => {});
            musicPlaying = true;
        }

        const rect = canvas.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * canvas.width;
        const clickY = ((e.clientY - rect.top) / rect.height) * canvas.height;

        // ... (your click logic remains the same - I didn't change the states)
        // Just make sure you keep your existing click logic here
    });

    // Video handler
    video.addEventListener('click', function() {
        if (gameState === "RAINY_VIDEO") {
            video.pause();
            video.style.display = "none";
            canvas.style.display = "block";
            gameState = "GLASSES_CAT";
        }
    });

    // Your other functions (triggerWalletToast, registerKey) stay exactly the same
</script>
