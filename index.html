<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC SHOWDOWN</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #gameCanvas { aspect-ratio: 9 / 16; height: 100vh; max-width: 100%; background: #0a0a0c; display: block; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="1080" height="1920"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Navigation States: "MENU", "PAGE_1", "PAGE_2", "PAGE_3", "PAGE_4", "ROOFTOP", "ATTACK_SCENE"
        let currentScreen = "MENU";

        // Pure Asset Pipeline Targets (No extensions extensions mixed up)
        const menuImg = new Image();
        menuImg.src = 'IMG_9002.png'; // Change to .PNG if your GitHub file uses uppercase!

        const rooftopImg = new Image();
        rooftopImg.src = 'IMG_9005.png';

        const attackImg = new Image();
        attackImg.src = 'IMG_9008.png';

        // Error Logging to see if GitHub is dropping the asset fetch
        menuImg.onerror = () => console.error("❌ Failed to load IMG_9002.png from GitHub server registry.");
        rooftopImg.onerror = () => console.error("❌ Failed to load IMG_9005.png from GitHub server registry.");
        attackImg.onerror = () => console.error("❌ Failed to load IMG_9008.png from GitHub server registry.");

        // Global Back Navigation
        function checkBackTap(touchY) {
            if (touchY < 200) {
                currentScreen = "MENU";
                console.log("🔄 Router: Returned to Main Menu.");
                return true;
            }
            return false;
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = ((e.touches[0].clientX - rect.left) / rect.width) * 1080;
            const touchY = ((e.touches[0].clientY - rect.top) / rect.height) * 1920;

            console.log(`🎯 Raw Input Matrix -> X: ${Math.round(touchX)}, Y: ${Math.round(touchY)}`);

            // Route Sub-pages Back Button
            if (currentScreen !== "MENU" && currentScreen !== "ROOFTOP" && currentScreen !== "ATTACK_SCENE") {
                if (checkBackTap(touchY)) return;
            }

            // --- MAIN MENU INTERACTION ROUTING ---
            if (currentScreen === "MENU") {
                // 1. CATETIC Header Logo -> Blank Page #1
                if (touchX > 60 && touchX < 1020 && touchY > 160 && touchY < 430) {
                    currentScreen = "PAGE_1";
                }
                // 2. Samurai Cat (Left Side) -> Blank Page #2
                else if (touchX > 30 && touchX < 450 && touchY > 650 && touchY < 1250) {
                    currentScreen = "PAGE_2";
                }
                // 3. Ninja Cat (Right Side) -> Blank Page #3
                else if (touchX > 630 && touchX < 1050 && touchY > 650 && touchY < 1250) {
                    currentScreen = "PAGE_3";
                }
                // 4. VS Center Letters Hitbox -> Blank Page #4
                else if (touchX > 450 && touchX < 630 && touchY > 800 && touchY < 1100) {
                    currentScreen = "PAGE_4";
                }
                // 5. Hard-Calibrated Start Button Bottom Floor Zone
                else if (touchY > 1650 && touchY < 1920 && touchX > 150 && touchX < 930) {
                    currentScreen = "ROOFTOP";
                    console.log("🏙️ Initialized Rooftop Environment.");
                }
            } 
            
            // --- ROOFTOP ARENA INTERACTION ROUTING ---
            else if (currentScreen === "ROOFTOP") {
                if (touchY < 150) {
                    currentScreen = "MENU";
                } 
                // Attack Sign Interaction Area -> Transition to IMG_9008
                else if (touchX > 340 && touchX < 740 && touchY > 1400 && touchY < 1850) {
                    currentScreen = "ATTACK_SCENE";
                    console.log("💥 ATTACK COMBAT STATE ENGAGED.");
                }
            }

            // --- COMBAT SEQUENCE ROUTING ---
            else if (currentScreen === "ATTACK_SCENE") {
                if (touchY < 200) {
                    currentScreen = "MENU";
                }
            }
        });

        function drawLoop() {
            ctx.clearRect(0, 0, 1080, 1920);
            
            switch(currentScreen) {
                case "MENU":
                    if (menuImg.complete && menuImg.naturalWidth !== 0) {
                        ctx.drawImage(menuImg, 0, 0, 1080, 1920);
                    } else {
                        // Diagnostic Visual Color Trigger if image is missing on server
                        ctx.fillStyle = "#1e1b4b"; 
                        ctx.fillRect(0, 0, 1080, 1920);
                        ctx.fillStyle = "#ef4444"; 
                        ctx.font = "bold 40px monospace";
                        ctx.fillText("[ ASSET MISSING OR WRONG EXTENSION ]", 140, 920);
                        ctx.fillStyle = "#a1a1aa";
                        ctx.fillText("Check filename casing in your repo", 160, 1000);
                    }
                    break;

                case "PAGE_1":
                    ctx.fillStyle = "#0d0e12"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#4ade80"; ctx.font = "bold 40px monospace";
                    ctx.fillText("<- TAP TOP TO RETURN", 50, 100);
                    ctx.fillText("[ PAGE #1: SYSTEM LOGS ]", 250, 960);
                    break;

                case "PAGE_2":
                    ctx.fillStyle = "#14110f"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#f97316"; ctx.font = "bold 40px monospace";
                    ctx.fillText("<- TAP TOP TO RETURN", 50, 100);
                    ctx.fillText("[ PAGE #2: SAMURAI SPECS ]", 240, 960);
                    break;

                case "PAGE_3":
                    ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#38bdf8"; ctx.font = "bold 40px monospace";
                    ctx.fillText("<- TAP TOP TO RETURN", 50, 100);
                    ctx.fillText("[ PAGE #3: NINJA SPECS ]", 270, 960);
                    break;

                case "PAGE_4":
                    ctx.fillStyle = "#1e1b4b"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#a855f7"; ctx.font = "bold 40px monospace";
                    ctx.fillText("<- TAP TOP TO RETURN", 50, 100);
                    ctx.fillText("[ PAGE #4: VS MATCHUP ]", 270, 960);
                    break;

                case "ROOFTOP":
                    if (rooftopImg.complete && rooftopImg.naturalWidth !== 0) {
                        ctx.drawImage(rooftopImg, 0, 0, 1080, 1920);
                    } else {
                        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 1080, 1920);
                        ctx.fillStyle = "#ef4444"; ctx.font = "bold 40px monospace";
                        ctx.fillText("[ ROOFTOP ASSET NOT FOUND ]", 240, 960);
                    }
                    break;

                case "ATTACK_SCENE":
                    if (attackImg.complete && attackImg.naturalWidth !== 0) {
                        ctx.drawImage(attackImg, 0, 0, 1080, 1920);
                    } else {
                        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 1080, 1920);
                        ctx.fillStyle = "#ef4444"; ctx.font = "bold 40px monospace";
                        ctx.fillText("[ ATTACK ASSET NOT FOUND ]", 240, 960);
                    }
                    break;
            }
            
            requestAnimationFrame(drawLoop);
        }
        drawLoop();
    </script>
</body>
</html>
