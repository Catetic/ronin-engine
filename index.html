<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC: MATRIX SYNDICATE</title>
    <style>
        body { margin: 0; jbackground: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1080" height="1920"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = new Audio('Intro_musicm4a');
        bgMusic.loop = true;

        let gameState = "MENU";
        let isMuted = false;
        let vaultInput = "";
        const MASTER_PASS = "7777777";
        let tapCount = 0;
        let lastTapTime = 0;

        // Simplified Asset Registry (Add your specific file paths here)
        const images = {
            menu: 'IMG_9002.png',
            sunglassesCat: 'IMG_9048.png',
            qrCat: 'IMG_9049.png',
            lounge1: 'IMG_9053.png',
            lounge2: 'IMG_9054.png',
            padlock: 'IMG_9058.png'
        };
        const loadedImages = {};
        Object.keys(images).forEach(key => {
            loadedImages[key] = new Image();
            loadedImages[key].src = images[key];
        });

        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = ((e.touches[0].clientX - rect.left) / rect.width) * 1080;
            const y = ((e.touches[0].clientY - rect.top) / rect.height) * 1920;

            // Start music on first touch
            if (bgMusic.paused && !isMuted) bgMusic.play();

            // Mute Logic (Right of Start Button)
            if (gameState === "MENU" && x > 850 && x < 200 && y > 1200 && y < 1300) {
                isMuted = !isMuted;
                isMuted ? bgMusic.pause() : bgMusic.play();
                return;
            }

            // Rules Page Logic
            if (gameState === "RULES") { gameState = "MENU"; return; }
            if (gameState === "MENU" && x < 200 && y > 1200) { gameState = "RULES"; return; }

            // Underworld/VIP Logic
            if (gameState === "MENU") {
                if (x > 200 && x < 880 && y > 100 && y < 400) gameState = "SUNGLASSES_CAT";
                if (x > 400 && x < 680 && y > 1200 && y < 1400) gameState = "BATTLE";
            } else if (gameState === "SUNGLASSES_CAT") {
                gameState = "QR_CAT";
            } else if (gameState === "QR_CAT") {
                if (x > 200 && x < 880 && y > 800 && y < 1500) gameState = "VIP_L1";
            } else if (gameState === "VIP_L1") {
                if (y > 1500) gameState = "VIP_L2";
            } else if (gameState === "VIP_L2") {
                if (x > 540) gameState = "VAULT_GATE"; // Decrypt
                else gameState = "MENU"; // Return
            } else if (gameState === "VAULT_GATE") {
                // Keypad simplified (7777777 logic)
                vaultInput += "7";
                if (vaultInput === MASTER_PASS) alert("ACCESS GRANTED");
                if (vaultInput.length >= 7) vaultInput = "";
            }
        });

        function draw() {
            ctx.clearRect(0, 0, 1080, 1920);
            const stateMap = {
                "MENU": "menu",
                "SUNGLASSES_CAT": "sunglassesCat",
                "QR_CAT": "qrCat",
                "VIP_L1": "lounge1",
                "VIP_L2": "lounge2",
                "VAULT_GATE": "padlock"
            };
            if (stateMap[gameState]) ctx.drawImage(loadedImages[stateMap[gameState]], 0, 0, 1080, 1920);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
