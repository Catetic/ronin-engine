<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC: AUDIO SHOWDOWN</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #gameCanvas { width: 100vw; height: 100vh; object-fit: contain; background: #0a0a0c; display: block; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="1080" height="1920"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Engine State Matrix
        let gameState = "MENU";
        let selectedCharacter = "SAMURAI"; 
        let isMuted = false;
        let audioInitialized = false;
        
        let totalTaps = 0;
        let timeRemaining = 5;
        let countdownTicker = null;

        // --- AUDIO ENGINE CORES ---
        const introTrack = new Audio('Intro_music.m4a');
        const battleTrack = new Audio('combat_theme.mp3'); // Placeholder name for your fast 150BPM track
        
        introTrack.loop = true;
        battleTrack.loop = true;

        // --- VISUAL ASSET CORES ---
        const menuImg = new Image(); 
        menuImg.src = 'IMG_9002.png';

        function initAudio() {
            if (audioInitialized) return;
            audioInitialized = true;
            manageAudioRouting();
        }

        function manageAudioRouting() {
            if (isMuted) {
                introTrack.pause();
                battleTrack.pause();
                return;
            }

            if (gameState === "MENU") {
                battleTrack.pause();
                battleTrack.currentTime = 0;
                introTrack.play().catch(e => console.log("Audio waiting for interaction tap."));
            } 
            else if (gameState === "TAP_FRENZY") {
                introTrack.pause();
                introTrack.currentTime = 0;
                battleTrack.play().catch(e => console.log("Battle track file missing or loading."));
            }
        }

        function startMatch() {
            totalTaps = 0;
            timeRemaining = 5;
            gameState = "TAP_FRENZY";
            manageAudioRouting(); // Instantly switch from mysterious calm to battle energy

            countdownTicker = setInterval(() => {
                timeRemaining--;
                if (timeRemaining <= 0) {
                    clearInterval(countdownTicker);
                    
                    // Rigged outcome resolution mechanics
                    if (selectedCharacter === "NINJA") {
                        gameState = "RIGGED_FAIL";
                    } else if (totalTaps / 5 >= 6) {
                        gameState = "SPEAR_COMBO";
                    } else {
                        gameState = "NINJA_COUNTER";
                    }
                    
                    // Kill battle audio at game over screen
                    battleTrack.pause();
                    
                    setTimeout(() => { 
                        gameState = "MENU"; 
                        manageAudioRouting(); // Return back to looping the intro bells
                    }, 5000);
                }
            }, 1000);
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio(); // Unlocks mobile browser audio safety lock on the very first touch

            const rect = canvas.getBoundingClientRect();
            const touchX = ((e.touches[0].clientX - rect.left) / rect.width) * 1080;
            const touchY = ((e.touches[0].clientY - rect.top) / rect.height) * 1920;

            if (gameState === "MENU") {
                // Left Shh Emoji Boundary Hitbox
                if (touchX > 20 && touchX < 180 && touchY > 1320 && touchY < 1520) {
                    isMuted = !isMuted;
                    manageAudioRouting();
                    return;
                }
                // Right Shh Emoji Boundary Hitbox
                if (touchX > 900 && touchX < 1060 && touchY > 1320 && touchY < 1520) {
                    isMuted = !isMuted;
                    manageAudioRouting();
                    return;
                }
                // Select Samurai (Blue Matrix Eye Segment)
                if (touchX > 30 && touchX < 480 && touchY > 600 && touchY < 1200) {
                    selectedCharacter = "SAMURAI";
                }
                // Select Ninja (Red Matrix Eye Segment)
                else if (touchX > 600 && touchX < 1050 && touchY > 600 && touchY < 1200) {
                    selectedCharacter = "NINJA";
                }
                // Start Button Footer Area Click
                else if (touchY > 1600 && touchY < 1900 && touchX > 150 && touchX < 930) {
                    startMatch();
                }
            } 
            else if (gameState === "TAP_FRENZY") {
                totalTaps++;
            }
        });

        function drawEngine() {
            ctx.clearRect(0, 0, 1080, 1920);

            switch(gameState) {
                case "MENU":
                    if (menuImg.complete) {
                        ctx.drawImage(menuImg, 0, 0, 1080, 1920);
                    }

                    // Render Interactive indicator rings over your background emojis
                    ctx.lineWidth = 8;
                    if (isMuted) {
                        ctx.strokeStyle = "#ef4444"; // Red Cross indicating muted state
                        // Draw Left Cross
                        ctx.beginPath(); ctx.moveTo(40, 1360); ctx.lineTo(140, 1460); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(140, 1360); ctx.lineTo(40, 1460); ctx.stroke();
                        // Draw Right Cross
                        ctx.beginPath(); ctx.moveTo(940, 1360); ctx.lineTo(1040, 1460); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(1040, 1360); ctx.lineTo(940, 1460); ctx.stroke();
                    } else if (audioInitialized) {
                        ctx.strokeStyle = "#22c55e"; // Active Green ring showing sound is live
                        ctx.beginPath(); ctx.arc(90, 1410, 60, 0, Math.PI * 2); ctx.stroke();
                        ctx.beginPath(); ctx.arc(990, 1410, 60, 0, Math.PI * 2); ctx.stroke();
                    }

                    // Drawing Neon Selection Rings around the character faces
                    ctx.lineWidth = 10;
                    if (selectedCharacter === "SAMURAI") {
                        ctx.strokeStyle = "rgba(59, 130, 246, 0.6)"; // Soft Blue Glow
                        ctx.beginPath(); ctx.arc(260, 930, 240, 0, Math.PI * 2); ctx.stroke();
                    } else {
                        ctx.strokeStyle = "rgba(239, 68, 68, 0.6)"; // Soft Red Glow
                        ctx.beginPath(); ctx.arc(820, 930, 240, 0, Math.PI * 2); ctx.stroke();
                    }
                    break;

                case "TAP_FRENZY":
                    ctx.fillStyle = "#020617"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 50px monospace";
                    ctx.fillText(`TIME: ${timeRemaining}s`, 100, 200);
                    ctx.fillText(`TOTAL CLICKS: ${totalTaps}`, 550, 200);
                    break;

                case "SPEAR_COMBO":
                    ctx.fillStyle = "#064e3b"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#34d399"; ctx.font = "bold 65px sans-serif";
                    ctx.fillText("⚡ BLUE PILL VICTORY ⚡", 180, 800);
                    break;

                case "NINJA_COUNTER":
                    ctx.fillStyle = "#450a0a"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#ef4444"; ctx.font = "bold 70px sans-serif";
                    ctx.fillText("❌ TOO SLOW ❌", 310, 800);
                    break;

                case "RIGGED_FAIL":
                    ctx.fillStyle = "#1e0303"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#ef4444"; ctx.font = "bold 65px sans-serif";
                    ctx.fillText("🔴 TRAPPED IN THE MATRIX 🔴", 110, 800);
                    break;
            }

            requestAnimationFrame(drawEngine);
        }
        drawEngine();
    </script>
</body>
</html>
