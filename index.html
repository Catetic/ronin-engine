<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC OS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9 / 16;
            box-shadow: 0 0 20px rgba(0, 255, 70, 0.3);
        }
        #debug {
            position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 14px;
            background: rgba(0,0,0,0.7); padding: 8px; z-index: 100;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="debug">CATETIC OS v0.3</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const debug = document.getElementById('debug');

    canvas.width = 1080;
    canvas.height = 1920;

    // Assets
    const images = {};
    const assetFiles = {
        menu: 'IMG_9002.png',
        battle: 'IMG_9005.png',     // ← Attack room
        glasses: 'IMG_8681.png',
        lounge1: 'IMG_9053.png',
        qrCat: 'IMG_9049.png',
        lounge2: 'IMG_9054.png',
        keypad: 'IMG_9058.png',
        gameroom: 'IMG_9044.png',
        victory: 'IMG_9188.png'
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(assetFiles).length;

    Object.keys(assetFiles).forEach(key => {
        images[key] = new Image();
        images[key].onload = () => { 
            loadedCount++;
            if (loadedCount === totalAssets) debug.textContent = "All assets loaded ✓";
        };
        images[key].onerror = () => console.error(`Missing: ${assetFiles[key]}`);
        images[key].src = assetFiles[key];
    });

    // Game State
    let gameState = "MENU";
    let inputCode = "";
    let silverPressCount = 0;
    let toastMessage = "";
    let toastTimer = 0;

    const masterPassword = "7777777K";

    function showToast(msg, duration = 1600) {
        toastMessage = msg;
        toastTimer = duration;
    }

    function gameLoop() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (loadedCount < totalAssets) {
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 60px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("CATETIC OS", 540, 800);
            ctx.font = "40px Courier New";
            ctx.fillText(`LOADING ${loadedCount}/${totalAssets}`, 540, 950);
        } 
        else if (gameState === "MENU" && images.menu) {
            ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "KEYPAD" && images.keypad) {
            ctx.drawImage(images.keypad, 0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 80px Courier New";
            ctx.textAlign = "center";
            ctx.fillText(inputCode || "ENTER CODE", 540, 1100);
        } 
        else if (gameState === "SECRET_DOJO" && images.victory) {
            ctx.drawImage(images.victory, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "BATTLE" && images.battle) {
            ctx.drawImage(images.battle, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP1" && images.lounge1) {
            ctx.drawImage(images.lounge1, 0, 0, canvas.width, canvas.height);
        }
        else if (images[gameState.toLowerCase()]) {
            ctx.drawImage(images[gameState.toLowerCase()], 0, 0, canvas.width, canvas.height);
        }

        // Toast
        if (toastTimer > 0) {
            ctx.fillStyle = "rgba(0,255,70,0.95)";
            ctx.fillRect(180, 140, 720, 160);
            ctx.fillStyle = "#000";
            ctx.font = "bold 52px Courier New";
            ctx.textAlign = "center";
            ctx.fillText(toastMessage, 540, 240);
            toastTimer -= 16;
        }

        requestAnimationFrame(gameLoop);
    }

    function handleTap(x, y) {
        if (gameState === "MENU") {
            if (y > 1380) {
                if (x < 540) {
                    gameState = "KEYPAD";
                    inputCode = "";
                    showToast("ENTER PASSCODE", 1200);
                } else {
                    showToast("🔊 MUSIC", 800);
                }
            }
        } 
        else if (gameState === "KEYPAD") {
            // Silver Button
            if (y > 1300 && y < 1700 && x > 300 && x < 780) {
                silverPressCount++;
                if (silverPressCount === 1) showToast("[NEXT HOME]", 1400);
                else if (silverPressCount === 2) {
                    showToast("COOL", 1800);
                    setTimeout(() => { gameState = "MENU"; silverPressCount = 0; }, 1600);
                }
            } 
            // K Button
            else if (y > 1650 && x > 700) {
                if (inputCode === masterPassword) {
                    gameState = "SECRET_DOJO";
                    showToast("ACCESS GRANTED — RONIN PROTOCOL", 2000);
                } else {
                    showToast("єROR", 1600);
                    inputCode = "";
                    silverPressCount = 0;
                }
            }
        } 
        else if (gameState === "SECRET_DOJO") {
            gameState = "BATTLE";           // ← Go to Attack Room
            showToast("ENTERING ATTACK PROTOCOL", 1400);
        } 
        else if (gameState === "BATTLE") {
            // Big ATTACK button area (bottom)
            if (y > 1500) {
                gameState = "VIP1";
                showToast("VIP 1 ACCESS", 1600);
            }
        } 
        else if (gameState === "VIP1") {
            // Temporary - tap to go back
            gameState = "BATTLE";
            showToast("RETURNING TO BATTLE", 1200);
        }
    }

    // Touch & Click
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
        handleTap(x, y);
    });

    canvas.addEventListener('click', e => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        handleTap(x, y);
    });

    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
