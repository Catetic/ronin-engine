<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const video = document.getElementById('catVideo');

    // Force mobile canvas size
    canvas.width = 1080;
    canvas.height = 1920;

    // Sound
    const bgMusic = new Audio('Intro_music.m4a');
    bgMusic.loop = true;
    let musicPlaying = false;

    function toggleMusic() {
        if (musicPlaying) {
            bgMusic.pause();
            musicPlaying = false;
        } else {
            bgMusic.play().catch(() => {});
            musicPlaying = true;
        }
    }

    // Assets
    const images = {};
    const assetFiles = {
        menu: 'IMG_9002.png',
        glasses: 'IMG_8681.png',
        keypad: 'IMG_9058.png',
        gameroom: 'IMG_9044.png'
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(assetFiles).length;

    Object.keys(assetFiles).forEach(key => {
        images[key] = new Image();
        images[key].onload = () => {
            loadedCount++;
            console.log(`✅ Loaded: ${key}`);
        };
        images[key].onerror = () => console.error(`❌ Missing: ${assetFiles[key]}`);
        images[key].src = assetFiles[key];
    });

    let gameState = "MENU";
    let toastMessage = "";
    let toastTimer = 0;

    function showToast(msg, duration = 1800) {
        toastMessage = msg;
        toastTimer = duration;
    }

    function gameLoop() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (loadedCount < totalAssets) {
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 52px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("LOADING CATETIC OS...", 540, 860);
            ctx.font = "38px Courier New";
            ctx.fillText(`${loadedCount}/${totalAssets} assets`, 540, 960);
        }
        else if (gameState === "MENU" && images.menu) {
            ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 52px Courier New";
            ctx.textAlign = "left";
            ctx.fillText("RULES", 90, 1520);

            ctx.fillStyle = musicPlaying ? "#00ff46" : "#ff1a1a";
            ctx.textAlign = "center";
            ctx.fillText(musicPlaying ? "🔊" : "🔇", 980, 1520);
        } 
        else if (gameState === "RULES") {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 42px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("Hello Neo... 🐱", 540, 300);
            ctx.font = "32px Courier New";
            ctx.textAlign = "left";
            ctx.fillText("Rules terminal loading...", 120, 600);
        }

        // Toast
        if (toastTimer > 0) {
            ctx.fillStyle = "rgba(0,255,70,0.95)";
            ctx.fillRect(150, 280, 780, 160);
            ctx.fillStyle = "#000";
            ctx.font = "bold 48px Courier New";
            ctx.textAlign = "center";
            ctx.fillText(toastMessage, 540, 380);
            toastTimer -= 16;
        }

        requestAnimationFrame(gameLoop);
    }

    // Mobile-friendly tap handler
    function handleTap(x, y) {
        console.log(`Tap at: ${Math.round(x)}, ${Math.round(y)}`);

        if (gameState === "MENU") {
            if (y > 1380 && y < 1620) {
                if (x < 500) {
                    gameState = "RULES";
                    showToast("ENTERING TERMINAL...", 1400);
                } else {
                    toggleMusic();
                    showToast(musicPlaying ? "MUSIC ON" : "MUSIC OFF", 1200);
                }
            }
        }
    }

    // Touch + Click
    function getTapPos(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        if (e.touches && e.touches[0]) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const pos = getTapPos(e);
        handleTap(pos.x, pos.y);
    });

    canvas.addEventListener('click', (e) => {
        const pos = getTapPos(e);
        handleTap(pos.x, pos.y);
    });

    // Start everything
    requestAnimationFrame(gameLoop);
    console.log("🚀 CATETIC OS v0.4 started on iPhone");
</script>
