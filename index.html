<script>
    // ... (keep all your existing variables: canvas, ctx, images, music, etc.)

    let gameState = "MENU";
    let playerSide = null; // "BLUE" or "RED"
    let clickCount = 0;
    let battleStartTime = 0;
    let battleTimer = 0;
    let hasWon = false;

    // Add to gameLoop inside the else if chain:
    else if (gameState === "BATTLE") {
        ctx.drawImage(images.battle || images.menu, 0, 0, canvas.width, canvas.height);

        // Timer
        const timeLeft = Math.ceil((5000 - (Date.now() - battleStartTime)) / 1000);
        
        ctx.fillStyle = "#ff1a1a";
        ctx.font = "bold 120px Courier New";
        ctx.textAlign = "center";
        ctx.fillText(timeLeft.toString(), 540, 500);

        ctx.fillStyle = "#00ff46";
        ctx.font = "bold 60px Courier New";
        ctx.fillText("ATTACK! " + clickCount, 540, 1400);

        ctx.font = "38px Courier New";
        ctx.fillText(playerSide + " SAMURAI", 540, 800);

        if (timeLeft <= 0) {
            endBattle();
        }
    }

    function startBattle(side) {
        playerSide = side;
        gameState = "BATTLE";
        clickCount = 0;
        battleStartTime = Date.now();
        battleTimer = 5000;
        hasWon = false;
        
        // Fast music
        if (bgMusic) {
            bgMusic.pause();
            // You can change src to battle music later
        }
    }

    function endBattle() {
        const cps = clickCount; // 5 seconds
        const won = playerSide === "BLUE" ? cps >= 30 : cps >= 20; // 6+ per sec for blue

        if (won) {
            showToast("VICTORY ACHIEVED 🐱", 2500);
            setTimeout(() => {
                gameState = "VIP_LOUNGE";
            }, 800);
        } else {
            showToast("SIMULATION FAILED", 1800);
            setTimeout(() => gameState = "MENU", 1200);
        }
    }

    // Update handleTap function:
    function handleTap(x, y) {
        if (gameState === "MENU") {
            // Left = Blue, Right = Red (adjust coordinates based on your image)
            if (y > 600 && y < 1100) {
                if (x < 540) {
                    startBattle("BLUE");
                } else {
                    startBattle("RED");
                }
            }
        } 
        else if (gameState === "BATTLE") {
            clickCount++;
        } 
        else if (gameState === "VIP_LOUNGE") {
            // QR tap logic later
            showToast("TAP QR TO COPY ADDRESS", 1500);
        }
    }

    // ... rest of your code (requestAnimationFrame etc.)
</script>
