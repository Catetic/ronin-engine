<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catetic</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --dark-bg: #0d0d0d;
            --panel-border: #222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Video Base Background Engine */
        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.45;
        }

        /* Foreground Grid Layer */
        #game-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr auto auto;
            padding: 12px;
            gap: 12px;
        }

        /* Main View Window */
        .stage-area {
            grid-column: 1;
            grid-row: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .display-frame {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.25s ease-in-out;
            pointer-events: none;
            z-index: 3;
        }

        .display-frame.active {
            opacity: 1;
        }

        /* Bottom Assets Deck */
        .sidebar {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            flex-direction: row;
            height: 90px;
            gap: 10px;
        }

        .panel-view {
            flex: 1;
            height: 100%;
            border: 1px solid var(--panel-border);
            background: rgba(5, 5, 5, 0.85);
            border-radius: 6px;
            overflow: hidden;
        }

        .panel-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Console Deck */
        .console-bar {
            grid-column: 1;
            grid-row: 3;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            justify-items: center;
        }

        /* Control Button Elements */
        #catetic-btn {
            background: #000;
            color: var(--matrix-green);
            border: 1.5px solid var(--matrix-green);
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.15);
            transition: all 0.1s ease;
            white-space: nowrap;
        }

        #catetic-btn:active {
            background: var(--matrix-green);
            color: #000;
            transform: scale(0.96);
        }

        .status-box {
            color: #555;
            font-size: 0.7rem;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.4;
        }
        .status-box span {
            color: var(--matrix-green);
            display: block;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video-player" playsinline loop muted autoplay></video>
    </div>

    <main id="game-container">
        
        <section class="stage-area">
            <img id="cat-display" class="display-frame" src="" alt="Main Panel Frame">
        </section>

        <aside class="sidebar">
            <div class="panel-view">
                <img id="padlock-img" class="panel-img" src="" alt="Keypad UI Asset">
            </div>
            <div class="panel-view">
                <img id="lounge-img" class="panel-img" src="" alt="Lounge Automation Engine">
            </div>
        </aside>

        <footer class="console-bar">
            <div class="status-box">STATE: <span id="system-status">READY</span></div>
            <button id="catetic-btn">CATETIC</button>
            <div class="status-box">COUNT: <span id="press-counter">0</span></div>
        </footer>

    </main>

    <script>
        const ASSETS = {
            rainyCat:          '1775353548457063.mp4',
            mainCatSunglasses: 'IMG_9058.png',
            catQrCodes:        'IMG_9053.png',
            loungeRest:        'IMG_9048.png',
            loungeSalute:      'IMG_9049.png',
            padlockPanel:      'IMG_9044.png'
        };

        let cateticPressCount = 0;

        const elements = {
            videoPlayer:  document.getElementById('video-player'),
            catDisplay:   document.getElementById('cat-display'),
            padlockImg:   document.getElementById('padlock-img'),
            loungeImg:    document.getElementById('lounge-img'),
            cateticBtn:   document.getElementById('catetic-btn'),
            pressCounter: document.getElementById('press-counter'),
            systemStatus: document.getElementById('system-status')
        };

        function initEngine() {
            if (elements.padlockImg) elements.padlockImg.src = ASSETS.padlockPanel;
            if (elements.loungeImg)  elements.loungeImg.src  = ASSETS.loungeRest;

            if (elements.videoPlayer) {
                elements.videoPlayer.src = ASSETS.rainyCat;
                elements.videoPlayer.play().catch(() => {
                    console.log("Hardware interface validation deferred.");
                });
            }
        }

        function processCateticTrigger() {
            cateticPressCount++;
            if (elements.pressCounter) elements.pressCounter.textContent = cateticPressCount;

            if (cateticPressCount === 1) {
                if (elements.catDisplay) {
                    elements.catDisplay.src = ASSETS.mainCatSunglasses;
                    elements.catDisplay.classList.add('active');
                }
                if (elements.systemStatus) elements.systemStatus.textContent = "ACTIVE";

            } else if (cateticPressCount === 2) {
                if (elements.catDisplay) {
                    elements.catDisplay.src = ASSETS.catQrCodes;
                }
                if (elements.systemStatus) elements.systemStatus.textContent = "QR_LOCKED";
                executeLoungeSequence();
            }
        }

        function executeLoungeSequence() {
            if (elements.loungeImg) elements.loungeImg.src = ASSETS.loungeSalute;
            setTimeout(() => {
                if (elements.loungeImg) elements.loungeImg.src = ASSETS.loungeRest;
            }, 3000);
        }

        if (elements.cateticBtn) {
            elements.cateticBtn.addEventListener('click', processCateticTrigger);
        }

        document.body.addEventListener('click', () => {
            if (elements.videoPlayer && elements.videoPlayer.paused) {
                elements.videoPlayer.play().catch(()=>{});
            }
        }, { once: true });

        document.addEventListener('DOMContentLoaded', initEngine);
    </script>
</body>
</html>
