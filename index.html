<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('catVideo');

    canvas.width = 1080;
    canvas.height = 1920;

    // Sound
    const bgMusic = new Audio('Intro_music.m4a');
    bgMusic.loop = true;
    let musicPlaying = false;

    function toggleMusic() {
        if (musicPlaying) {
            bgMusic.pause();
            musicPlaying = false;
        } else {
            bgMusic.play().catch(e => console.log("Music autoplay blocked"));
            musicPlaying = true;
        }
    }

    // Assets
    const images = {};
    const assetFiles = {
        menu: 'IMG_9002.png',
        battle: 'IMG_9005.png',
        glasses: 'IMG_8681.png',
        lounge1: 'IMG_9053.png',
        qrCat: 'IMG_9049.png',
        lounge2: 'IMG_9054.png',
        keypad: 'IMG_9058.png',
        gameroom: 'IMG_9044.png'
    };

    let loadedCount = 0;
    Object.keys(assetFiles).forEach(key => {
        images[key] = new Image();
        images[key].src = assetFiles[key];
        images[key].onload = () => {
            loadedCount++;
            if (loadedCount === Object.keys(assetFiles).length) {
                requestAnimationFrame(gameLoop);
            }
        };
    });

    // Game State
    let gameState = "MENU";
    let toastMessage = "";
    let toastTimer = 0;
    let inputCode = "";
    const masterPassword = "7777777";

    // Typewriter for Rules
    let typeProgress = 0;
    let lastTypeTime = 0;
    let rulesFinished = false;

    const rulesText = [
        "THE CATETIC SIMULATION IS UNSTABLE.",
        "",
        "--- CHOOSE YOUR ALIGNMENT ---",
        "🔵 SAMURAI CAT (LEFT): THE BLUE PILL PATH.",
        "   FIGHT FOR FREEDOM WITH ONE FAST ATTACK.",
        "   SURPASS 6 CLICKS PER SECOND TO BREAK OUT.",
        "",
        "🔴 NINJA CAT (RIGHT): THE RED PILL TRAP.",
        "   RIGGED BY THE ARCHITECT. CHOOSING THIS",
        "   SIDE LEADS TO COMPLETE CRASH.",
        "",
        "WARNING: ONCE 'DRINK WATER' IS PRESSED,",
        "THE SYSTEM WILL INJECT 150 BPM CHAOS.",
        "THERE IS NO WAY BACK.",
        "",
        "-> TAP ANYWHERE TO EXIT TERMINAL _"
    ];

    function showToast(msg, duration = 2200) {
        toastMessage = msg;
        toastTimer = duration;
    }

    function gameLoop() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === "MENU" && images.menu) {
            ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);

            // Rules button
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 45px Courier New";
            ctx.textAlign = "left";
            ctx.fillText("RULES", 80, 1480);

            // Music toggle
            ctx.fillStyle = musicPlaying ? "#00ff46" : "#ff1a1a";
            ctx.textAlign = "center";
            ctx.fillText(musicPlaying ? "🔊" : "🔇", 980, 1480);

        } 
        else if (gameState === "RULES") {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.shadowColor = "#00ff46";
            ctx.shadowBlur = 25;
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 42px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("Hello Neo... 🐱", 540, 260);

            ctx.font = "32px Courier New";
            ctx.textAlign = "left";

            const now = Date.now();
            if (!rulesFinished && now - lastTypeTime > 45) {
                typeProgress++;
                lastTypeTime = now;
            }

            const full = rulesText.join("\n");
            const visible = full.substring(0, typeProgress);
            const lines = visible.split("\n");

            let y = 380;
            for (let line of lines) {
                ctx.fillText(line, 110, y);
                y += 58;
            }

            if (rulesFinished) {
                ctx.font = "bold 140px Courier New";
                ctx.fillText("😹", 540, 1650);
            }
            ctx.shadowBlur = 0;

            if (typeProgress >= full.length) rulesFinished = true;
        } 
        else if (gameState === "GLASSES_CAT" && images.glasses) {
            ctx.drawImage(images.glasses, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "KEYPAD" && images.keypad) {
            ctx.drawImage(images.keypad, 0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff1a1a";
            ctx.font = "bold 120px Courier New";
            ctx.textAlign = "center";
            ctx.fillText(inputCode || "ENTER CODE", 540, 420);
            ctx.textAlign = "left";
        } 
        else if (gameState === "GAME_ROOM" && images.gameroom) {
            ctx.drawImage(images.gameroom, 0, 0, canvas.width, canvas.height);
        }

        // Toast
        if (toastTimer > 0) {
            ctx.fillStyle = "rgba(0, 255, 70, 0.95)";
            ctx.fillRect(180, 120, 720, 140);
            
            ctx.fillStyle = "#000";
            ctx.font = "bold 48px Courier New";
            ctx.textAlign = "center";
            ctx.fillText(toastMessage, 540, 200);
            
            toastTimer -= 16; // ~60fps
        }

        requestAnimationFrame(gameLoop);
    }

    // ====================== INPUT HANDLING ======================
    function handleTap(x, y) {
        if (gameState === "MENU") {
            // Rules button area
            if (x > 50 && x < 350 && y > 1400 && y < 1550) {
                gameState = "RULES";
                typeProgress = 0;
                rulesFinished = false;
                lastTypeTime = Date.now();
                return;
            }

            // Music toggle area
            if (x > 850 && x < 1050 && y > 1400 && y < 1550) {
                toggleMusic();
                return;
            }
        }

        if (gameState === "RULES" && rulesFinished) {
            // Tap anywhere to continue
            gameState = "GLASSES_CAT";
            showToast("ACCESS GRANTED", 1800);
            return;
        }

        if (gameState === "GLASSES_CAT") {
            gameState = "KEYPAD";
            inputCode = "";
            return;
        }

        if (gameState === "KEYPAD") {
            // Simple tap to add digit simulation (you can improve later)
            if (inputCode.length < 7) {
                inputCode += Math.floor(Math.random() * 10); // placeholder
            }
            if (inputCode.length === 7) {
                if (inputCode === masterPassword) {
                    showToast("MASTER UNLOCKED 🐱", 2500);
                    setTimeout(() => {
                        gameState = "GAME_ROOM";
                        video.play().catch(() => {});
                    }, 800);
                } else {
                    showToast("ACCESS DENIED", 1600);
                    inputCode = "";
                }
            }
        }
    }

    // Touch & Click support
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        handleTap(x, y);
    });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
        handleTap(x, y);
    });

    // Start the loop
    requestAnimationFrame(gameLoop);
</script>
