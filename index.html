<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: #000;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9 / 16;
            box-shadow: 0 0 20px rgba(0, 255, 70, 0.3);
        }
        #catVideo {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
        }
    </style>
</head>
<body>

    <video id="catVideo" loop playsinline src="1775353548457063.mp4"></video>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('catVideo');

    canvas.width = 1080;
    canvas.height = 1920;

    // --- SOUND ENGINE ---
    const bgMusic = new Audio('Intro_music.m4a');
    bgMusic.loop = true;
    let musicPlaying = false;

    function toggleMusicSystem() {
        if (musicPlaying) {
            bgMusic.pause();
            musicPlaying = false;
        } else {
            bgMusic.play().then(() => {
                musicPlaying = true;
            }).catch(e => console.log("Audio waiting for user gesture context interaction."));
        }
    }

    // --- ASSET FILE REGISTRY ---
    const images = {};
    const assetFiles = {
        menu: 'IMG_9002.png',       // 1. Main menu screen
        battle: 'IMG_9005.png',     // 3. Attack room scene
        glasses: 'IMG_8681.png',    // 4. Cat with black glasses
        lounge1: 'IMG_9053.png',    // 5. VIP Lounge 1
        qrCat: 'IMG_9049.png',      // 6. Cat with QR codes
        lounge2: 'IMG_9054.png',    // 7. VIP Lounge 2
        keypad: 'IMG_9058.png',     // 8. Copper Keypad Door
        gameroom: 'IMG_9044.png'    // 9. Secret Game Room
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(assetFiles).length;
    
    for (let key in assetFiles) {
        images[key] = new Image();
        images[key].src = assetFiles[key];
        images[key].onload = () => {
            loadedCount++;
            if (loadedCount === totalAssets) {
                requestAnimationFrame(gameLoop);
            }
        };
    }

    // --- SYSTEM STORAGE STATES ---
    let gameState = "MENU"; 
    let toastMessage = "";
    let toastTimer = 0;
    let inputCode = "";
    const masterPassword = "7777777";
    let typeProgress = 0;      // Tracks how many letters have typed out
    let lastTypeTime = 0;      // Tracks the speed of the typing effect
    const rulesText = [
        "THE CATETIC SIMULATION IS UNSTABLE.",
        "",
        "--- CHOOSE YOUR ALIGNMENT ---",
        "🔵 SAMURAI CAT (LEFT): THE BLUE PILL PATH.",
        "   FIGHT FOR FREEDOM WITH ONE FAST ATTACK.",
        "   SURPASS 6 CLICKS PER SECOND TO BREAK OUT.",
        "",
        "🔴 NINJA CAT (RIGHT): THE RED PILL TRAP.",
        "   RIGGED BY THE ARCHITECT. CHOOSING THIS",
        "   SIDE LEADS TO COMPLETE CRASH.",
        "",
        "WARNING: ONCE 'DRINK WATER' IS PRESSED,",
        "THE SYSTEM WILL INJECT 150 BPM CHAOS.",
        "THERE IS NO WAY BACK.",
        "",
        "-> TAP ANYWHERE TO EXIT TERMINAL _"
    ];

    // --- ENGINE CORE RENDERING LOOP ---
    function gameLoop() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === "MENU") {
            ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);
            
            // Fixed layout alignment and size for the RULES button text
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 40px 'Courier New', monospace";
            ctx.textAlign = "left";
            ctx.fillText("RULES", 50, 1470);
            
            // CATETIC Music Toggle Status Overlay Text
            ctx.fillStyle = musicPlaying ? "rgba(0, 255, 70, 0.8)" : "rgba(255, 26, 26, 0.8)";
            ctx.font = "bold 40px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(musicPlaying ? " 🟢 " : " 🛑 ", 970, 1470);
            ctx.textAlign = "start";
        } 
        else if (gameState === "RULES") {
            ctx.fillStyle = "#020a03";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 36px 'Courier New', monospace";
            ctx.fillText("Hello Neo... 👑", 80, 150);
            
            ctx.font = "30px 'Courier New', monospace";
            let startY = 250;
            for (let i = 0; i < rulesText.length; i++) {
                ctx.fillText(rulesText[i], 80, startY + (i * 45));
            }
            
            ctx.strokeStyle = "#00ff46";
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(540, 1400, 150, 0, Math.PI, false);
            ctx.stroke();
            ctx.fillRect(440, 1250, 40, 15);
            ctx.fillRect(600, 1250, 40, 15);
        }
            // ... your menu closing bracket ends around line 165
       } 
       else if (gameState === "RULES") {
        // 1. Clear with terminal black background
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Set the matrix style
        ctx.fillStyle = "#00ff46";
        ctx.font = "32px 'Courier New', Courier, monospace";
        ctx.textAlign = "left";

        // 3. Typewriter character progression 
        // // 3. Typewriter character progression ticker        if (typeof window.typeProgress === 'undefined') window.typeProgress = 0;
        if (typeof window.lastTypeTime === 'undefined') window.lastTypeTime = 0;
        let currentTime = Date.now();
        if (currentTime - window.lastTypeTime > 30) { 
            window.typeProgress++;
            window.lastTypeTime = currentTime;
        }

        // // 4. Extract and split the typewriter substring
        let fullTextString = rulesText.join("\n");
        let visibleText = fullTextString.substring(0, window.typeProgress);
        let linesToDraw = visibleText.split("\n");
        // 5. Draw the typed rows down the screen
        let startY = 200; 
        let lineHeight = 50;
        for (let i = 0; i < linesToDraw.length; i++) {
            ctx.fillText(linesToDraw[i], 50, startY + (i * lineHeight));
        }
        }
         else if (gameState === "BATTLE") { // This continues your existing line 166!
        ctx.drawImage(images.battle, 0, 0, canvas.width, canvas.height);
         }
        
        
        }
        else if (gameState === "BATTLE") { // This continues your existing line 166!
        ctx.drawImage(images.battle, 0, 0, canvas.width, canvas.height);
        }    
        } 
        else if (gameState === "BATTLE") {
            ctx.drawImage(images.battle, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "GLASSES_CAT") {
            ctx.drawImage(images.glasses, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP_LOUNGE_1") {
            ctx.drawImage(images.lounge1, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "QR_CAT") {
            ctx.drawImage(images.qrCat, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP_LOUNGE_2") {
            ctx.drawImage(images.lounge2, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "KEYPAD") {
            ctx.drawImage(images.keypad, 0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#ff1a1a";
            ctx.font = "bold 100px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(inputCode || "CLOSED", 540, 320); 
            ctx.textAlign = "start"; 
        } 
        else if (gameState === "GAME_ROOM") {
            ctx.drawImage(images.gameroom, 0, 0, canvas.width, canvas.height);
        }

        // Clipboards notification confirmation alert
        if (toastTimer > 0) {
            ctx.fillStyle = "rgba(0, 255, 70, 0.9)";
            ctx.fillRect(240, 80, 600, 100);
            ctx.fillStyle = "#000000";
            ctx.font = "bold 32px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(toastMessage, 540, 142);
            ctx.textAlign = "start";
            toastTimer--;
        }

        requestAnimationFrame(gameLoop);
    }

    // --- HARDWARE RECT BOUNDING TOUCH INTERACTION SENSORS ---
    canvas.addEventListener('click', function(e) {
        // Auto-run music player context on initial interaction step
        if (!musicPlaying && gameState === "MENU") {
            bgMusic.play().then(() => { musicPlaying = true; }).catch(e => {});
        }

        const rect = canvas.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * canvas.width;
        const clickY = ((e.clientY - rect.top) / rect.height) * canvas.height;

        console.log("Touch Intercept Matrix -> State: " + gameState + " | X: " + Math.floor(clickX) + " Y: " + Math.floor(clickY));

        // 1 & 2. MAIN MENU OVERLAYS
        if (gameState === "MENU") {
            // 🟢🛑 Button Header Frame Bounds to toggle soundtrack playback loops
            if (clickX > 750 && clickX < 1060 && clickY > 1400 && clickY < 1520) {
                toggleMusicSystem();
                return;
            }
            // // Fine-tuned green RULES text link region
            if (clickX > 20 && clickX < 240 && clickY > 1400 && clickY < 1520) {
            typeProgress = 0;  // <-- Add this right here to reset the typing progress!
            gameState = "RULES";
            return;
            }
            // Big red START action center button collider
            if (clickX > 240 && clickX < 840 && clickY > 1300 && clickY < 1650) {
                gameState = "BATTLE";
                return;
            }
        } 
        
        // 2. TERMINAL INSTRUCTIONS WINDOW
        else if (gameState === "RULES") {
            gameState = "MENU";
        } 
        
        // 3. PLAY/ATTACK ROOM (IMG_9005)
        else if (gameState === "BATTLE") {
            // Pressing green "ATTACK" floor tile advances to Black Glasses Cat
            if (clickX > 100 && clickX < 980 && clickY > 1350 && clickY < 1650) {
                gameState = "GLASSES_CAT";
            }
        } 
        
        // 4. BLACK GLASSES GLITCH SCREEN (IMG_8681)
        else if (gameState === "GLASSES_CAT") {
            gameState = "QR_CAT"; // Shift directly onto QR codes map layout
        } 
        
        // 6. CAT WITH QR CODES INTERACTION GRID (IMG_9049)
        else if (gameState === "QR_CAT") {
            // Left QR Button Collider (Bitcoin Portal)
            if (clickX > 20 && clickX < 490 && clickY > 700 && clickY < 1200) {
                triggerWalletToast("BTC", "bc1q92lt3zqcsfmyjasjchgqxp4w2khmqwse9c5f59");
            } 
            // Right QR Button Collider (Ethereum Portal)
            else if (clickX > 520 && clickX < 1060 && clickY > 700 && clickY < 1200) {
                triggerWalletToast("ETH", "0x8238da0AEB879164a7B53607E527350f0D1F1990");
            } 
            // Tap matrix code background walls to step down onto video system layer path
            else {
                gameState = "RAINY_VIDEO";
                canvas.style.display = "none";
                video.style.display = "block";
                video.play();
            }
        } 
        
        // 5. VIP LOUNGE 1 (IMG_9053)
        else if (gameState === "VIP_LOUNGE_1") {
            // Wide horizontal footer link to propose layout toasts
            if (clickY > 1450 && clickY < 1900) {
                gameState = "VIP_LOUNGE_2";
            }
        } 
        
        // 7. VIP LOUNGE 2 SCREEN INTERACTION ROUTER (IMG_9054)
        else if (gameState === "VIP_LOUNGE_2") {
            // Split Action Row mapping
            if (clickX > 50 && clickX < 500 && clickY > 1550 && clickY < 1900) {
                gameState = "MENU"; // "RETURN TO REALITY" button drops back out safely
            }
            else if (clickX > 540 && clickX < 1030 && clickY > 1550 && clickY < 1900) {
                gameState = "KEYPAD"; // "PROPOSE TOAST" button launches encryption pad lock
                inputCode = ""; 
            }
        } 
        
        // 8. COPPER KEYPAD DOOR AUTHENTICATOR INTERFACE (IMG_9058)
        else if (gameState === "KEYPAD") {
            if (clickY > 450 && clickY < 1250) {
                if (clickY > 480 && clickY < 640) {
                    if (clickX > 250 && clickX < 450) registerKey("1");
                    else if (clickX > 460 && clickX < 640) registerKey("2");
                    else if (clickX > 650 && clickX < 850) registerKey("3");
                }
                else if (clickY > 670 && clickY < 830) {
                    if (clickX > 250 && clickX < 450) registerKey("4");
                    else if (clickX > 460 && clickX < 640) registerKey("5");
                    else if (clickX > 650 && clickX < 850) registerKey("6");
                }
                else if (clickY > 860 && clickY < 1020) {
                    if (clickX > 250 && clickX < 450) registerKey("7");
                    else if (clickX > 460 && clickX < 640) registerKey("8");
                    else if (clickX > 650 && clickX < 850) registerKey("9");
                }
                else if (clickY > 1050 && clickY < 1210) {
                    if (clickX > 250 && clickX < 450) registerKey("0");
                    else if (clickX > 460 && clickX < 640) registerKey("K"); // Submit and execute logic
                    else if (clickX > 650 && clickX < 850) registerKey("C"); // Clean memory screen buffer
                }
            }
            // Back out element to return to reality line loop safely
            else if (clickY > 1400 && clickY < 1650) {
                gameState = "MENU";
            }
        }
        
        // 9. UNLOCKED SECRET GAME ROOM (IMG_9044)
        else if (gameState === "GAME_ROOM") {
            gameState = "MENU"; // Resets back onto entry point safely
        }
    });

    // Handle background media display sequences cleanly
    video.addEventListener('click', function() {
        if (gameState === "RAINY_VIDEO") {
            video.pause();
            video.style.display = "none";
            canvas.style.display = "block";
            gameState = "GLASSES_CAT"; // Loop right back to the black glasses cat page sequence
        }
    });

    function triggerWalletToast(type, address) {
        navigator.clipboard.writeText(address).then(() => {
            toastMessage = type + " COPIED TO MATRIX";
            toastTimer = 120; 
            setTimeout(() => {
                gameState = "VIP_LOUNGE_1"; // Advance cleanly to Lounge Stage 1
            }, 1100);
        }).catch(err => {
            gameState = "VIP_LOUNGE_1"; 
        });
    }

    function registerKey(val) {
        if (val === "C") {
            inputCode = "";
        } else if (val === "K") {
            if (inputCode === masterPassword) {
                gameState = "GAME_ROOM"; // Code 7777777 successfully triggers Game Room entry!
            } else {
                inputCode = "ERROR";
                setTimeout(() => { inputCode = ""; }, 900);
            }
        } else {
            if (inputCode === "ERROR" || inputCode.length >= 7) {
                inputCode = "";
            }
            inputCode += val;
        }
    }
</script>
</body>
</html>
