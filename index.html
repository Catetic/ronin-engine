<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: #000;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9 / 16;
            box-shadow: 0 0 20px rgba(0, 255, 70, 0.3);
        }
        /* Style for the Matrix crypto pop-up window */
        #matrixPopup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 500px;
            background-color: rgba(0, 10, 2, 0.95);
            border: 4px solid #00ff46;
            padding: 30px;
            z-index: 100;
            color: #00ff46;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 70, 0.5);
        }
        #matrixPopup h2 {
            font-size: 32px;
            font-style: italic;
            margin-bottom: 30px;
        }
        #matrixPopup .crypto-title {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
        #matrixPopup .crypto-address {
            font-size: 14px;
            color: #ffffff;
            word-break: break-all;
            margin: 5px 0 20px 0;
            background: transparent;
        }
        #catVideo {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
        }
    </style>
</head>
<body>

    <video id="catVideo" loop playsinline src="1775353548457063.mp4"></video>
    <canvas id="gameCanvas"></canvas>

    <div id="matrixPopup">
        <h2>" you know </h2>
        
        <div class="crypto-title" style="color: #0055ff;">Ethereum</div>
        <div class="crypto-address">0x8238da0AEB879164a7B53607E527350f0D1F1990</div>
        
        <div class="crypto-title" style="color: #ffaa00;">Bitcoin</div>
        <div class="crypto-address">bc1q92lt3zqcsfmyjasjchgqxp4w2khmqwse9c5f59</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('catVideo');
    const popup = document.getElementById('matrixPopup');

    canvas.width = 1080;
    canvas.height = 1920;

    // --- SOUND ENGINE ---
    const bgMusic = new Audio('Intro_music.m4a');
    bgMusic.loop = true;
    let musicPlaying = false;

    function toggleMusicSystem() {
        if (musicPlaying) {
            bgMusic.pause();
            musicPlaying = false;
        } else {
            bgMusic.play().then(() => {
                musicPlaying = true;
            }).catch(e => console.log("Audio waiting for user gesture context interaction."));
        }
    }

    // --- AUDIO BEEP HOOKS ---
    function playBeep1() {
        // [SPACE FOR BEEP 1: Triggered on all standard buttons]
        console.log("Beep 1 triggered");
    }

    function playBeep2() {
        // [SPACE FOR BEEP 2: Triggered on Keypad ERROR]
        console.log("Beep 2 triggered");
    }

    function playBeep3() {
        // [SPACE FOR BEEP 3: Triggered on Keypad 'C' button clear]
        console.log("Beep 3 triggered");
    }

    // --- ASSET FILE REGISTRY ---
    const images = {};
    const assetFiles = {
        menu: 'IMG_9002.png',       // 1. Main menu screen
        battle: 'IMG_9005.png',     // 3. Attack room scene
        glasses: 'IMG_8681.png',    // 4. Cat with black glasses
        lounge1: 'IMG_9053.png',    // 5. VIP Lounge 1 (IMG_9053)
        qrCat: 'IMG_9049.png',      // 6. Cat with QR codes
        lounge2: 'IMG_9054.png',    // 7. VIP Lounge 2
        keypad: 'IMG_9058.png',     // 8. Copper Keypad Door
        gameroom: 'IMG_9044.png',   // 9. Secret Game Room
        room8603: 'IMG_8603.png'    // 10. Room opened by 7777777+K
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(assetFiles).length;
    
    for (let key in assetFiles) {
        images[key] = new Image();
        images[key].src = assetFiles[key];
        images[key].onload = () => {
            loadedCount++;
            if (loadedCount === totalAssets) {
                requestAnimationFrame(gameLoop);
            }
        };
    }

    // --- SYSTEM STORAGE STATES ---
    let gameState = "MENU"; 
    let toastMessage = "";
    let toastTimer = 0;
    
    // Keypad states
    let inputCode = "";
    let keypadDisplay = "COOL";
    let silverButtonPressCount = 0;

    // Selection highlights
    let selectedCat = ""; // Can be "BLUE" (Samurai) or "RED" (Ninja)

    // Popup stage tracker for testing sequence
    let popupClickCount = 0;

    let typeProgress = 0;      
    let lastTypeTime = 0;      
    const rulesText = [
        "THE CATETIC SIMULATION IS UNSTABLE.",
        "",
        "--- CHOOSE YOUR ALIGNMENT ---",
        "🔵 SAMURAI CAT (LEFT): THE BLUE PILL PATH.",
        "   FIGHT FOR FREEDOM WITH ONE FAST ATTACK.",
        "   SURPASS 6 CLICKS PER SECOND TO BREAK OUT.",
        "",
        "🔴 NINJA CAT (RIGHT): THE RED PILL TRAP.",
        "   RIGGED BY THE ARCHITECT. CHOOSING THIS",
        "   SIDE LEADS TO COMPLETE CRASH.",
        "",
        "WARNING: ONCE 'DRINK WATER' IS PRESSED,",
        "THE SYSTEM WILL INJECT 150 BPM CHAOS.",
        "THERE IS NO WAY BACK.",
        "",
        "-> TAP ANYWHERE TO EXIT TERMINAL _"
    ];

    // --- ENGINE CORE RENDERING LOOP ---
    function gameLoop() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === "MENU") {
            ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);
            
            // Draw square selection outlines around the cats
            ctx.lineWidth = 8;
            if (selectedCat === "BLUE") {
                ctx.strokeStyle = "#0055ff"; // Blue square around Samurai (Left)
                ctx.strokeRect(60, 420, 440, 440);
            } else if (selectedCat === "RED") {
                ctx.strokeStyle = "#ff1a1a"; // Red square around Ninja (Right)
                ctx.strokeRect(580, 420, 440, 440);
            }

            // Fixed layout alignment and size for the RULES button text
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 40px 'Courier New', monospace";
            ctx.textAlign = "left";
            ctx.fillText("RULES", 50, 1470);
            
            // CATETIC Music Toggle Status Overlay Text
            ctx.fillStyle = musicPlaying ? "rgba(0, 255, 70, 0.8)" : "rgba(255, 26, 26, 0.8)";
            ctx.font = "bold 40px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(musicPlaying ? " 🟢 " : " 🛑 ", 970, 1470);
            ctx.textAlign = "start";
        } 
        else if (gameState === "RULES") {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ff46";
            ctx.font = "32px 'Courier New', Courier, monospace";
            ctx.textAlign = "left";

            if (typeof window.typeProgress === 'undefined') {
                window.typeProgress = 0;
            }
            if (typeof window.lastTypeTime === 'undefined') {
                window.lastTypeTime = 0;
            }
            let currentTime = Date.now();
            if (currentTime - window.lastTypeTime > 30) { 
                window.typeProgress++;
                window.lastTypeTime = currentTime;
            }

            let fullTextString = rulesText.join("\n");
            let visibleText = fullTextString.substring(0, window.typeProgress);
            let linesToDraw = visibleText.split("\n");
            
            let startY = 200; 
            let lineHeight = 50;
            for (let i = 0; i < linesToDraw.length; i++) {
                ctx.fillText(linesToDraw[i], 50, startY + (i * lineHeight));
            }
        }
        else if (gameState === "BATTLE") {
            ctx.drawImage(images.battle, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "GLASSES_CAT") {
            ctx.drawImage(images.glasses, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP_LOUNGE_1") {
            ctx.drawImage(images.lounge1, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "QR_CAT") {
            ctx.drawImage(images.qrCat, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP_LOUNGE_2") {
            ctx.drawImage(images.lounge2, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "KEYPAD") {
            ctx.drawImage(images.keypad, 0, 0, canvas.width, canvas.height);
            
            // Restructured Display Location & Text content tracking
            ctx.fillStyle = "#ff1a1a";
            ctx.font = "bold 90px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(keypadDisplay, 540, 320); 
            ctx.textAlign = "start"; 
        } 
        else if (gameState === "GAME_ROOM") {
            ctx.drawImage(images.gameroom, 0, 0, canvas.width, canvas.height);
        }
        else if (gameState === "ROOM_8603") {
            ctx.drawImage(images.room8603, 0, 0, canvas.width, canvas.height);
        }

        // Clipboards notification confirmation alert
        if (toastTimer > 0) {
            ctx.fillStyle = "rgba(0, 255, 70, 0.9)";
            ctx.fillRect(240, 80, 600, 100);
            ctx.fillStyle = "#000000";
            ctx.font = "bold 32px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(toastMessage, 540, 142);
            ctx.textAlign = "start";
            toastTimer--;
        }

        requestAnimationFrame(gameLoop);
    }

    // --- HARDWARE RECT BOUNDING TOUCH INTERACTION SENSORS ---
    canvas.addEventListener('click', function(e) {
        if (!musicPlaying && gameState === "MENU") {
            bgMusic.play().then(() => { musicPlaying = true; }).catch(e => {});
        }

        const rect = canvas.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * canvas.width;
        const clickY = ((e.clientY - rect.top) / rect.height) * canvas.height;

        console.log("Touch Intercept Matrix -> State: " + gameState + " | X: " + Math.floor(clickX) + " Y: " + Math.floor(clickY));

        // 1 & 2. MAIN MENU OVERLAYS
        if (gameState === "MENU") {
            // Soundtrack button
            if (clickX > 750 && clickX < 1060 && clickY > 1400 && clickY < 1520) {
                toggleMusicSystem();
                return;
            }
            // Rules link
            if (clickX > 20 && clickX < 240 && clickY > 1400 && clickY < 1520) {
                window.typeProgress = 0;  
                gameState = "RULES";
                return;
            }

            // SELECT SAMURAI (Left Side) -> Blue Square Outline
            if (clickX > 60 && clickX < 500 && clickY > 420 && clickY < 860) {
                selectedCat = "BLUE";
                return;
            }
            // SELECT NINJA (Right Side) -> Red Square Outline
            if (clickX > 580 && clickX < 1020 && clickY > 420 && clickY < 860) {
                selectedCat = "RED";
                return;
            }

            // CATETIC LOGO LINK -> Routes through simulated blank.html directly to VIP_LOUNGE_1 (IMG_9053)
            if (clickX > 300 && clickX < 780 && clickY > 50 && clickY < 180) {
                console.log("Navigating CATETIC route -> blank.html -> VIP_LOUNGE_1");
                gameState = "VIP_LOUNGE_1";
                popupClickCount = 0;
                return;
            }

            // VS BUTTON LINK -> Takes player to new separate pages (Underground pathways)
            if (clickX > 450 && clickX < 630 && clickY > 200 && clickY < 350) {
                console.log("VS Button Clicked -> Heading to Underground Pathways");
                // Temporary route designation to demonstrate pathway click execution
                gameState = "VIP_LOUNGE_2"; 
                return;
            }

            // Big red START action button
            if (clickX > 240 && clickX < 840 && clickY > 1300 && clickY < 1650) {
                gameState = "BATTLE";
                return;
            }
        } 
        
        else if (gameState === "RULES") {
            gameState = "MENU";
        } 
        
        else if (gameState === "BATTLE") {
            if (clickX > 100 && clickX < 980 && clickY > 1350 && clickY < 1650) {
                gameState = "GLASSES_CAT";
            }
        } 
        
        else if (gameState === "GLASSES_CAT") {
            gameState = "QR_CAT"; 
        } 
        
        else if (gameState === "QR_CAT") {
            if (clickX > 20 && clickX < 490 && clickY > 700 && clickY < 1200) {
                triggerWalletToast("BTC", "bc1q92lt3zqcsfmyjasjchgqxp4w2khmqwse9c5f59");
            } 
            else if (clickX > 520 && clickX < 1060 && clickY > 700 && clickY < 1200) {
                triggerWalletToast("ETH", "0x8238da0AEB879164a7B53607E527350f0D1F1990");
            } 
            else {
                gameState = "RAINY_VIDEO";
                canvas.style.display = "none";
                video.style.display = "block";
                video.play();
            }
        } 
        
        // 5. VIP LOUNGE 1 (IMG_9053) INTERACTION MATRIX
        else if (gameState === "VIP_LOUNGE_1") {
            // Click action area to copy Ethereum address on click and open the matrix layout pop-up window module
            if (clickX > 200 && clickX < 880 && clickY > 500 && clickY < 1300) {
                navigator.clipboard.writeText("0x8238da0AEB879164a7B53607E527350f0D1F1990").then(() => {
                    toastMessage = "ETH COPIED TO PAW";
                    toastTimer = 60;
                }).catch(err => {});

                // Reveal custom styled popup panel window view layer directly
                popup.style.display = "block";
                popupClickCount = 1; 
                return;
            }

            // Wide horizontal footer navigation fallback link
            if (clickY > 1450 && clickY < 1900) {
                gameState = "VIP_LOUNGE_2";
            }
        } 
        
        else if (gameState === "VIP_LOUNGE_2") {
            if (clickX > 50 && clickX < 500 && clickY > 1550 && clickY < 1900) {
                gameState = "MENU"; 
            }
            else if (clickX > 540 && clickX < 1030 && clickY > 1550 && clickY < 1900) {
                gameState = "KEYPAD"; 
                // Reset Keypad variables
                inputCode = "";
                keypadDisplay = "COOL";
                silverButtonPressCount = 0;
            }
        } 
        
        // 8. COPPER KEYPAD DOOR AUTHENTICATOR (IMG_9058)
        else if (gameState === "KEYPAD") {
            // FIXED KEYPAD TOUCH RECT AREAS (Aligned downward precisely past display screen box area)
            if (clickY > 400 && clickY < 1400) {
                // Row 1: Keys 1, 2, 3
                if (clickY > 450 && clickY < 640) {
                    if (clickX > 200 && clickX < 420) handleKeypadInput("1");
                    else if (clickX > 430 && clickX < 650) handleKeypadInput("2");
                    else if (clickX > 660 && clickX < 880) handleKeypadInput("3");
                }
                // Row 2: Keys 4, 5, 6
                else if (clickY > 670 && clickY < 860) {
                    if (clickX > 200 && clickX < 420) handleKeypadInput("4");
                    else if (clickX > 430 && clickX < 650) handleKeypadInput("5");
                    else if (clickX > 660 && clickX < 880) handleKeypadInput("6");
                }
                // Row 3: Keys 7, 8, 9
                else if (clickY > 890 && clickY < 1080) {
                    if (clickX > 200 && clickX < 420) handleKeypadInput("7");
                    else if (clickX > 430 && clickX < 650) handleKeypadInput("8");
                    else if (clickX > 660 && clickX < 880) handleKeypadInput("9");
                }
                // Row 4: Keys 0, K, C
                else if (clickY > 1110 && clickY < 1300) {
                    if (clickX > 200 && clickX < 420) handleKeypadInput("0");
                    else if (clickX > 430 && clickX < 650) handleKeypadInput("K"); 
                    else if (clickX > 660 && clickX < 880) handleKeypadInput("C"); 
                }
            }
            
            // BIG SILVER BUTTON OVERLAY PRESS TARGET
            if (clickX > 350 && clickX < 730 && clickY > 1400 && clickY < 1650) {
                playBeep1();
                silverButtonPressCount++;
                if (silverButtonPressCount === 1) {
                    console.log("Silver Button Tap 1 -> Heading to next home (index.html)");
                    window.location.href = "index.html";
                } else if (silverButtonPressCount === 2) {
                    console.log("Silver Button Tap 2 -> Going to Main Page Deployment Root");
                    window.location.href = "https://catetic.github.io/";
                    silverButtonPressCount = 0;
                }
            }
        }
        
        else if (gameState === "GAME_ROOM" || gameState === "ROOM_8603") {
            gameState = "MENU"; 
        }
    });

    // Window global body listener tracking to intercept test clicks targeting the matrix overlay pop-up box
    window.addEventListener('click', function(e) {
        if (gameState === "VIP_LOUNGE_1" && popupClickCount > 0) {
            // Capture events specifically targeted outside core action copy bound box region
            if (popup.style.display === "block") {
                if (popupClickCount === 1) {
                    // Tap 1: Close pop-up window panel module 
                    popup.style.display = "none";
                    popupClickCount = 2;
                } else if (popupClickCount === 2) {
                    // Tap 2: Return back to core main page room sequence context safely for testing loop execution
                    popupClickCount = 0;
                    gameState = "MENU";
                }
            }
        }
    });

    video.addEventListener('click', function() {
        if (gameState === "RAINY_VIDEO") {
            video.pause();
            video.style.display = "none";
            canvas.style.display = "block";
            gameState = "GLASSES_CAT"; 
        }
    });

    function triggerWalletToast(type, address) {
        navigator.clipboard.writeText(address).then(() => {
            toastMessage = type + " COPIED TO MATRIX";
            toastTimer = 120; 
            setTimeout(() => {
                gameState = "VIP_LOUNGE_1"; 
            }, 1100);
        }).catch(err => {
            gameState = "VIP_LOUNGE_1"; 
        });
    }

    // --- KEYPAD OPERATIONAL INPUT DISPATCH FILTER MANAGER ---
    function handleKeypadInput(key) {
        if (key === "C") {
            playBeep3();
            inputCode = "";
            keypadDisplay = "COOL";
        } 
        else if (key === "K") {
            if (inputCode === "7777777") {
                playBeep1();
                gameState = "ROOM_8603"; // Opens room image layout file sequence directly
            } else {
                playBeep2();
                keypadDisplay = "ERROR";
                inputCode = ""; 
            }
        } 
        else {
            playBeep1();
            
            // If display currently reads default prompt or system alert string, reset buffer allocation sequence layout
            if (keypadDisplay === "COOL" || keypadDisplay === "ERROR") {
                keypadDisplay = "";
            }
            
            // Restrict input tracking chain string content sequence strictly onto the specified limit boundary maximum
            if (inputCode.length < 9) {
                inputCode += key;
                keypadDisplay = inputCode;
            }
        }
    }
</script>
</body>
</html>
