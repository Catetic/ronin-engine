<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: #000;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9 / 16;
            box-shadow: 0 0 20px rgba(0, 255, 70, 0.3);
        }
        #catVideo {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
        }
    </style>
</head>
<body>

    <video id="catVideo" loop playsinline src="1775353548457063.mp4"></video>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('catVideo');

    // Mapped precisely to portrait layout boundaries
    canvas.width = 1080;
    canvas.height = 1920;

    // --- SOUND TRACK ENGINE ---
    const bgMusic = new Audio('Intro_music.m4a');
    bgMusic.loop = true;
    let musicStarted = false;

    function startMusic() {
        if (!musicStarted) {
            bgMusic.play().catch(e => console.log("Audio waiting for user click."));
            musicStarted = true;
        }
    }

    // --- PRISTINE ASSET REGISTRY ---
    const images = {};
    const assetFiles = {
        menu: 'IMG_8681.png',      // Main two cats split screen
        morpheus: 'IMG_9048.png',  // Tap 1: Cat in sunglasses
        qrCat: 'IMG_9049.png',     // Tap 2: Green cat with QRs
        lounge1: 'IMG_9053.png',   // VIP Lounge 1: Hooded Agent glass down
        lounge2: 'IMG_9054.png',   // VIP Lounge 2: Raised glass salute
        keypad: 'IMG_9058.png'     // Vault Gate: Copper circuit hardware panel
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(assetFiles).length;
    
    for (let key in assetFiles) {
        images[key] = new Image();
        images[key].src = assetFiles[key];
        images[key].onload = () => {
            loadedCount++;
            if (loadedCount === totalAssets) {
                requestAnimationFrame(gameLoop);
            }
        };
    }

    // --- CORE STATE MACHINE ---
    let gameState = "MENU"; 
    let toastMessage = "";
    let toastTimer = 0;
    let inputCode = "";
    const masterPassword = "7777777"; // Seven Ronin Protocol

    // Retro Terminal Rules Text Array
    const rulesText = [
        "THE CATETIC SIMULATION IS UNSTABLE.",
        "",
        "--- CHOOSE YOUR ALIGNMENT ---",
        "🔵 SAMURAI CAT (LEFT): THE BLUE PILL PATH.",
        "   FIGHT FOR FREEDOM WITH ONE FAST ATTACK.",
        "   SURPASS 6 CLICKS PER SECOND TO BREAK OUT.",
        "",
        "🔴 NINJA CAT (RIGHT): THE RED PILL TRAP.",
        "   RIGGED BY THE ARCHITECT. CHOOSING THIS",
        "   SIDE LEADS TO COMPLETE CRASH.",
        "",
        "WARNING: ONCE 'DRINK WATER' IS PRESSED,",
        "THE SYSTEM WILL INJECT 150 BPM CHAOS.",
        "THERE IS NO WAY BACK.",
        "",
        "-> TAP ANYWHERE TO EXIT TERMINAL _"
    ];

    // --- DRAW RENDERING SWITCHBOARD ---
    function gameLoop() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === "MENU") {
            ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "RULES") {
            ctx.fillStyle = "#020b04";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 36px 'Courier New', monospace";
            ctx.fillText("Hello Neo... 😹", 80, 150);
            
            ctx.font = "30px 'Courier New', monospace";
            let startY = 250;
            for (let i = 0; i < rulesText.length; i++) {
                ctx.fillText(rulesText[i], 80, startY + (i * 45));
            }
            
            // Render Terminal Smile Outline Graphically
            ctx.strokeStyle = "#00ff46";
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(540, 1400, 150, 0, Math.PI, false);
            ctx.stroke();
            ctx.fillRect(440, 1250, 40, 15);
            ctx.fillRect(600, 1250, 40, 15);
        } 
        else if (gameState === "MORPHEUS_CAT") {
            ctx.drawImage(images.morpheus, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "QR_CAT") {
            ctx.drawImage(images.qrCat, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP_LOUNGE_1") {
            ctx.drawImage(images.lounge1, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP_LOUNGE_2") {
            ctx.drawImage(images.lounge2, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "KEYPAD") {
            ctx.drawImage(images.keypad, 0, 0, canvas.width, canvas.height);
            
            // Map text placement right over top red LED bounding box graphic
            ctx.fillStyle = "#ff1a1a";
            ctx.font = "bold 65px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(inputCode || "CLOSED", 540, 320); 
            ctx.textAlign = "start"; 
        } 
        else if (gameState === "WELCOME") {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 50px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText("ACCESS GRANTED", 540, 600);
            
            ctx.strokeStyle = "#00ff46";
            ctx.lineWidth = 12;
            ctx.beginPath();
            ctx.arc(540, 950, 200, 0, Math.PI, false);
            ctx.stroke();
            ctx.fillRect(420, 780, 50, 20);
            ctx.fillRect(610, 780, 50, 20);
            ctx.textAlign = "start";
        }

        // Action Overlay Toast Notification
        if (toastTimer > 0) {
            ctx.fillStyle = "rgba(0, 255, 70, 0.85)";
            ctx.fillRect(240, 80, 600, 100);
            ctx.fillStyle = "#000000";
            ctx.font = "bold 32px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(toastMessage, 540, 142);
            ctx.textAlign = "start";
            toastTimer--;
        }

        requestAnimationFrame(gameLoop);
    }

    // --- COORD INPUT TOUCH SENSOR INTERACTION MAP ---
    canvas.addEventListener('click', function(e) {
        startMusic(); 

        const rect = canvas.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * canvas.width;
        const clickY = ((e.clientY - rect.top) / rect.height) * canvas.height;

        console.log("Input Matrix Log -> State: " + gameState + " | X: " + Math.floor(clickX) + " Y: " + Math.floor(clickY));

        // 1. MAIN MENU INPUTS
        if (gameState === "MENU") {
            // Rules box click target area
            if (clickX > 50 && clickX < 350 && clickY > 1400 && clickY < 1600) {
                gameState = "RULES";
            }
            // Title text interaction space -> Moves to Sunglasses Cat
            else if (clickX > 150 && clickX < 930 && clickY > 100 && clickY < 400) {
                gameState = "MORPHEUS_CAT";
            }
        } 
        
        // 2. RULES TERMINAL INPUTS
        else if (gameState === "RULES") {
            gameState = "MENU"; // Clean fall-back route
        } 
        
        // 3. MORPHEUS SUNGLASSES CAT INPUTS
        else if (gameState === "MORPHEUS_CAT") {
            gameState = "QR_CAT"; // Single tap onward to QR node frame
        } 
        
        // 4. MATRIX QR CAT COORD TARGETS
        else if (gameState === "QR_CAT") {
            // BTC Area bounds check
            if (clickX > 140 && clickX < 490 && clickY > 740 && clickY < 1090) {
                triggerWalletToast("BTC", "bc1q92lt3zqcsfmyjasjchgqxp4w2khmqwse9c5f59");
            } 
            // ETH Area bounds check
            else if (clickX > 590 && clickX < 940 && clickY > 740 && clickY < 1090) {
                triggerWalletToast("ETH", "0x8238da0AEB879164a7B53607E527350f0D1F1990");
            } 
            // Fall-through background click opens casual rainy video
            else {
                gameState = "RAINY_VIDEO";
                canvas.style.display = "none";
                video.style.display = "block";
                video.play();
            }
        } 
        
        // 5. VIP LOUNGE PHASE 1 (HOOD UP/GLASS DOWN)
        else if (gameState === "VIP_LOUNGE_1") {
            // Bottom "PROPOSE A TOAST" target pad button
            if (clickX > 150 && clickX < 930 && clickY > 1500 && clickY < 1880) {
                gameState = "VIP_LOUNGE_2";
            }
        } 
        
        // 6. VIP LOUNGE PHASE 2 (RAISED GLASS SALUTE)
        else if (gameState === "VIP_LOUNGE_2") {
            // Left Button Target Split: Return to Reality
            if (clickX > 50 && clickX < 500 && clickY > 1600 && clickY < 1880) {
                gameState = "MENU";
            }
            // Right Button Target Split: Decrypt Privacy Vault -> Opens Copper Hardware
            else if (clickX > 540 && clickX < 1030 && clickY > 1600 && clickY < 1880) {
                gameState = "KEYPAD";
                inputCode = ""; 
            }
        } 
        
        // 7. COPPER CIRCUIT PANEL HARDWARE KEYPAD
        else if (gameState === "KEYPAD") {
            if (clickY > 450 && clickY < 1250) {
                // Row 1 mapping
                if (clickY > 480 && clickY < 640) {
                    if (clickX > 250 && clickX < 450) registerKey("1");
                    else if (clickX > 460 && clickX < 640) registerKey("2");
                    else if (clickX > 650 && clickX < 850) registerKey("3");
                }
                // Row 2 mapping
                else if (clickY > 670 && clickY < 830) {
                    if (clickX > 250 && clickX < 450) registerKey("4");
                    else if (clickX > 460 && clickX < 640) registerKey("5");
                    else if (clickX > 650 && clickX < 850) registerKey("6");
                }
                // Row 3 mapping
                else if (clickY > 860 && clickY < 1020) {
                    if (clickX > 250 && clickX < 450) registerKey("7");
                    else if (clickX > 460 && clickX < 640) registerKey("8");
                    else if (clickX > 650 && clickX < 850) registerKey("9");
                }
                // Row 4 mapping (0, OK/K, Clear/C)
                else if (clickY > 1050 && clickY < 1210) {
                    if (clickX > 250 && clickX < 450) registerKey("0");
                    else if (clickX > 460 && clickX < 640) registerKey("K"); 
                    else if (clickX > 650 && clickX < 850) registerKey("C"); 
                }
            }
            // Bottom "Abort Decryption" cancellation bar
            else if (clickX > 200 && clickX < 880 && clickY > 1400 && clickY < 1600) {
                gameState = "MENU";
            }
        }
        
        // 8. VAULT SMILE ACCESS GRANTED
        else if (gameState === "WELCOME") {
            gameState = "MENU"; 
        }
    });

    // Capture background video taps to clean reset back to main canvas
    video.addEventListener('click', function() {
        if (gameState === "RAINY_VIDEO") {
            video.pause();
            video.style.display = "none";
            canvas.style.display = "block";
            gameState = "MENU";
        }
    });

    // --- SYSTEM UTILITY OPERATIONS ---
    function triggerWalletToast(type, address) {
        navigator.clipboard.writeText(address).then(() => {
            toastMessage = type + " COPIED TO MATRIX";
            toastTimer = 120; 
            setTimeout(() => {
                gameState = "VIP_LOUNGE_1";
            }, 1100);
        }).catch(err => {
            gameState = "VIP_LOUNGE_1"; // Secure safety fallback routing
        });
    }

    function registerKey(val) {
        if (val === "C") {
            inputCode = "";
        } else if (val === "K") {
            if (inputCode === masterPassword) {
                gameState = "WELCOME";
            } else {
                inputCode = "ERROR";
                setTimeout(() => { inputCode = ""; }, 900);
            }
        } else {
            if (inputCode === "ERROR" || inputCode.length >= 7) {
                inputCode = "";
            }
            inputCode += val;
        }
    }
</script>
</body>
</html>
