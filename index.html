<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC: SHOWDOWN DECK</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #gameCanvas { width: 100vw; height: 100vh; object-fit: contain; background: #000; display: block; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="1080" height="1920"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = "MENU"; 
        
        // Asset Mapping
        const assets = {
            menu: new Image(),
            secret: new Image()
        };
        assets.menu.src = 'IMG_8681.png';
        assets.secret.src = 'IMG_9048.png';

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = ((e.touches[0].clientX - rect.left) / rect.width) * 1080;
            const y = ((e.touches[0].clientY - rect.top) / rect.height) * 1920;

            if (gameState === "MENU") {
                // Main Menu Hit Zones
                if (y > 40 && y < 450 && x > 40 && x < 1040) gameState = "CATETIC_SECRET"; // Logo Trap
                else if (y > 1280 && x < 240) gameState = "RULES"; // Rules
                else if (y > 1280 && x > 240 && x < 840) console.log("Arena Start"); // Start
            } else if (gameState === "CATETIC_SECRET") {
                // Mailto Pipeline for donators
                window.location.href = "mailto:yourmail@domain.com?subject=Syndicate%20Clearance%20Request";
                gameState = "MENU";
            } else {
                gameState = "MENU";
            }
        });

        function render() {
            ctx.clearRect(0, 0, 1080, 1920);
            if (gameState === "MENU" && assets.menu.complete) ctx.drawImage(assets.menu, 0, 0, 1080, 1920);
            else if (gameState === "CATETIC_SECRET" && assets.secret.complete) {
                ctx.drawImage(assets.secret, 0, 0, 1080, 1920);
                ctx.fillStyle = "#00ff66"; ctx.font = "bold 40px monospace";
                ctx.fillText("» TAP TO REGISTER FOR CIPHER", 180, 1600);
            }
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
