<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: #000;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-center: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9 / 16;
            box-shadow: 0 0 20px rgba(0, 255, 70, 0.3);
        }
        /* Hidden video element for the casual path branch */
        #catVideo {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
        }
    </style>
</head>
<body>

    <video id="catVideo" loop playsinline src="1775353548457063.mp4"></video>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('catVideo');

    // Establish absolute base matrix layout coordinates (Mobile portrait proportions)
    canvas.width = 1080;
    canvas.height = 1920;

    // --- SOUND ENGINE ---
    const bgMusic = new Audio('Intro_music.m4a');
    bgMusic.loop = true;
    let musicStarted = false;

    function startMusic() {
        if (!musicStarted) {
            bgMusic.play().catch(e => console.log("Audio waiting for user click interaction."));
            musicStarted = true;
        }
    }

    // --- CATETIC CORE ASSET REGISTRY ---
    const images = {};
    const assetFiles = {
        menu: 'IMG_8681.png',
        morpheus: 'IMG_9048.png',
        qrCat: 'IMG_9049.png',
        lounge1: 'IMG_9053.png',
        lounge2: 'IMG_9054.png',
        keypad: 'IMG_9058.png'
    };

    // Preload entire system repository assets into memory
    let loadedCount = 0;
    const totalAssets = Object.keys(assetFiles).length;
    
    for (let key in assetFiles) {
        images[key] = new Image();
        images[key].src = assetFiles[key];
        images[key].onload = () => {
            loadedCount++;
            if (loadedCount === totalAssets) {
                requestAnimationFrame(gameLoop);
            }
        };
    }

    // --- STATE MACHINE REGISTRY ---
    // States: "MENU", "RULES", "MORPHEUS_CAT", "QR_CAT", "RAINY_VIDEO", "VIP_LOUNGE_1", "VIP_LOUNGE_2", "KEYPAD", "WELCOME"
    let gameState = "MENU";
    let catTapCount = 0;
    let toastMessage = "";
    let toastTimer = 0;
    
    // Keypad Code variables
    let inputCode = "";
    const masterPassword = "7777777"; // Seven Ronin Protocol

    // Rules text streaming state
    let rulesText = [
        "THE CATETIC SIMULATION IS UNSTABLE.",
        "",
        "--- CHOOSE YOUR ALIGNMENT ---",
        "🔵 SAMURAI CAT (LEFT): THE BLUE PILL PATH.",
        "   FIGHT FOR FREEDOM WITH ONE FAST ATTACK.",
        "   SURPASS 6 CLICKS PER SECOND TO BREAK OUT.",
        "",
        "🔴 NINJA CAT (RIGHT): THE RED PILL TRAP.",
        "   RIGGED BY THE ARCHITECT. CHOOSING THIS",
        "   SIDE LEADS TO COMPLETE CRASH.",
        "",
        "WARNING: ONCE 'DRINK WATER' IS PRESSED,",
        "THE SYSTEM WILL INJECT 150 BPM CHAOS.",
        "THERE IS NO WAY BACK.",
        "",
        "-> TAP ANYWHERE TO EXIT TERMINAL _"
    ];

    // --- SYSTEM DRAW RENDERING ENGINE ---
    function gameLoop() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === "MENU") {
            ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);
        } 
        
        else if (gameState === "RULES") {
            ctx.fillStyle = "#020b04";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Render retro terminal terminal text interface
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 36px 'Courier New', monospace";
            ctx.fillText("Hello Neo... 😹", 80, 150);
            
            ctx.font = "30px 'Courier New', monospace";
            let startY = 250;
            for (let i = 0; i < rulesText.length; i++) {
                ctx.fillText(rulesText[i], 80, startY + (i * 45));
            }
            
            // Draw custom terminal smile indicator at base
            ctx.strokeStyle = "#00ff46";
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(540, 1400, 150, 0, Math.PI, false);
            ctx.stroke();
            // Smile eyes
            ctx.fillRect(440, 1250, 40, 15);
            ctx.fillRect(600, 1250, 40, 15);
        } 
        
        else if (gameState === "MORPHEUS_CAT") {
            ctx.drawImage(images.morpheus, 0, 0, canvas.width, canvas.height);
        } 
        
        else if (gameState === "QR_CAT") {
            ctx.drawImage(images.qrCat, 0, 0, canvas.width, canvas.height);
        } 
        
        else if (gameState === "VIP_LOUNGE_1") {
            ctx.drawImage(images.lounge1, 0, 0, canvas.width, canvas.height);
        } 
        
        else if (gameState === "VIP_LOUNGE_2") {
            ctx.drawImage(images.lounge2, 0, 0, canvas.width, canvas.height);
        } 
        
        else if (gameState === "KEYPAD") {
            ctx.drawImage(images.keypad, 0, 0, canvas.width, canvas.height);
            
            // Render transparent live text update right over red LED pane graphic
            ctx.fillStyle = "#ff1a1a";
            ctx.font = "bold 65px 'Courier New', monospace";
            ctx.textAlign = "center";
            // Map text placement right over top LED bounding area
            ctx.fillText(inputCode || "CLOSED", 540, 320); 
            ctx.textAlign = "start"; // reset alignment
        } 
        
        else if (gameState === "WELCOME") {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Success room clean green smile layout
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 50px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText("ACCESS GRANTED", 540, 600);
            
            ctx.strokeStyle = "#00ff46";
            ctx.lineWidth = 12;
            ctx.beginPath();
            ctx.arc(540, 950, 200, 0, Math.PI, false);
            ctx.stroke();
            ctx.fillRect(420, 780, 50, 20);
            ctx.fillRect(610, 780, 50, 20);
            ctx.textAlign = "start";
        }

        // Handle drawing clipboard confirmation toasts over screen
        if (toastTimer > 0) {
            ctx.fillStyle = "rgba(0, 255, 70, 0.85)";
            ctx.fillRect(240, 80, 600, 100);
            ctx.fillStyle = "#000000";
            ctx.font = "bold 32px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(toastMessage, 540, 142);
            ctx.textAlign = "start";
            toastTimer--;
        }

        requestAnimationFrame(gameLoop);
    }

    // --- COORD INPUT TOUCH SENSOR INTERACTION MAP ---
    canvas.addEventListener('click', function(e) {
        startMusic(); // Ignite loop on initial player touch interaction

        // Process scaled coordinates to map cleanly over custom aspect box size
        const rect = canvas.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * canvas.width;
        const clickY = ((e.clientY - rect.top) / rect.height) * canvas.height;

        console.log("OS Click Coordinates Tracked: X=" + Math.floor(clickX) + ", Y=" + Math.floor(clickY));

        // --- MENU ROUTING BRANCHES ---
        if (gameState === "MENU") {
            // Check 'Rules' label click region (Lower Left Area)
            if (clickX > 50 && clickX < 300 && clickY > 1400 && clickY < 1550) {
                gameState = "RULES";
                return;
            }
            // Check Main Title Logo Area Tap (Cycles Easter Egg Stages)
            if (clickX > 50 && clickX < 1030 && clickY > 100 && clickY < 400) {
                catTapCount++;
                if (catTapCount === 1) gameState = "MORPHEUS_CAT";
                return;
            }
        } 
        
        else if (gameState === "RULES") {
            // Tap anywhere returning logic rule
            gameState = "MENU";
        } 
        
        else if (gameState === "MORPHEUS_CAT") {
            // Secondary tap to upgrade to QR node path frame
            gameState = "QR_CAT";
        } 
        
        else if (gameState === "QR_CAT") {
            // DETECT QR PORTAL TOUCH COLLIDERS
            // BTC Box bounds matrix map
            if (clickX > 140 && clickX < 490 && clickY > 740 && clickY < 1090) {
                triggerWalletToast("BTC", "bc1q92lt3zqcsfmyjasjchgqxp4w2khmqwse9c5f59");
            } 
            // ETH Box bounds matrix map
            else if (clickX > 590 && clickX < 940 && clickY > 740 && clickY < 1090) {
                triggerWalletToast("ETH", "0x8238da0AEB879164a7B53607E527350f0D1F1990");
            } 
            // Casual Path Background Tap (Launches Rainy Video Room Loop)
            else {
                gameState = "RAINY_VIDEO";
                canvas.style.display = "none";
                video.style.display = "block";
                video.play();
            }
        } 
        
        else if (gameState === "VIP_LOUNGE_1") {
            // 'PROPOSE A TOAST' Button detection range at base layout
            if (clickX > 250 && clickX < 830 && clickY > 1700 && clickY < 1850) {
                gameState = "VIP_LOUNGE_2";
            }
        } 
        
        else if (gameState === "VIP_LOUNGE_2") {
            // [RETURN TO REALITY] button collider
            if (clickX > 100 && clickX < 500 && clickY > 1750 && clickY < 1880) {
                gameState = "MENU";
            }
            // [DECRYPT PRIVACY VAULT 🔒] button collider
            if (clickX > 580 && clickX < 980 && clickY > 1750 && clickY < 1880) {
                gameState = "KEYPAD";
                inputCode = ""; // Reset circuit panel memory
            }
        } 
        
        else if (gameState === "KEYPAD") {
            // MAP TRANSPARENT KEYPAD MATRIX OVER METALLIC BOX GRAPHICS
            // Row 1 (Buttons 1, 2, 3)
            if (clickY > 480 && clickY < 640) {
                if (clickX > 300 && clickX < 460) registerKey("1");
                if (clickX > 470 && clickX < 630) registerKey("2");
                if (clickX > 640 && clickX < 800) registerKey("3");
            }
            // Row 2 (Buttons 4, 5, 6)
            else if (clickY > 670 && clickY < 830) {
                if (clickX > 300 && clickX < 460) registerKey("4");
                if (clickX > 470 && clickX < 630) registerKey("5");
                if (clickX > 640 && clickX < 800) registerKey("6");
            }
            // Row 3 (Buttons 7, 8, 9)
            else if (clickY > 860 && clickY < 1020) {
                if (clickX > 300 && clickX < 460) registerKey("7");
                if (clickX > 470 && clickX < 630) registerKey("8");
                if (clickX > 640 && clickX < 800) registerKey("9");
            }
            // Row 4 (Buttons 0, K, C)
            else if (clickY > 1050 && clickY < 1210) {
                if (clickX > 300 && clickX < 460) registerKey("0");
                if (clickX > 470 && clickX < 630) registerKey("K"); // OK/Submit button
                if (clickX > 640 && clickX < 800) registerKey("C"); // Clear button
            }
            
            // Bottom 'Abort Decryption' cancellation bar zone
            if (clickX > 200 && clickX < 880 && clickY > 1400 && clickY < 1550) {
                gameState = "MENU";
            }
        }
        
        else if (gameState === "WELCOME") {
            // Reset simulation loop room
            gameState = "MENU";
            catTapCount = 0;
        }
    });

    // Capture direct video surface interaction back to standard interface canvas loop
    video.addEventListener('click', function() {
        if (gameState === "RAINY_VIDEO") {
            video.pause();
            video.style.display = "none";
            canvas.style.display = "block";
            gameState = "MENU";
            catTapCount = 0;
        }
    });

    // --- UTILITY PROCESSING ENGINE FUNCTIONS ---
    function triggerWalletToast(type, address) {
        navigator.clipboard.writeText(address).then(() => {
            toastMessage = type + " COPIED TO MATRIX";
            toastTimer = 120; // Displays confirmation overlay flash frames
            setTimeout(() => {
                gameState = "VIP_LOUNGE_1";
            }, 1000);
        }).catch(err => {
            // Backup routing option if clipboard security intercepts process loop
            gameState = "VIP_LOUNGE_1";
        });
    }

    function registerKey(val) {
        if (val === "C") {
            inputCode = "";
        } else if (val === "K") {
            if (inputCode === masterPassword) {
                gameState = "WELCOME";
            } else {
                inputCode = "ERROR";
                setTimeout(() => { inputCode = ""; }, 900);
            }
        } else {
            if (inputCode === "ERROR" || inputCode.length >= 7) {
                inputCode = "";
            }
            inputCode += val;
        }
    }
</script>
</body>
</html>
