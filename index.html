<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC SHOWDOWN</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #gameCanvas { aspect-ratio: 9 / 16; height: 100vh; max-width: 100%; background: #0a0a0c; display: block; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="1080" height="1920"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Navigation States: "MENU", "PAGE_1", "PAGE_2", "PAGE_3", "COMBAT"
        let currentScreen = "MENU";

        // Asset Pipeline Loading
        const menuImg = new Image();
        menuImg.src = 'IMG_9002.png'; // Corrected main menu image target

        const combatImg = new Image();
        combatImg.src = 'IMG_9005.png'; // Cyberpunk rooftop combat arena

        // Global Back Button Touch Helper
        function checkBackTap(touchX, touchY) {
            // Tapping near the upper top zone returns player to main core
            if (touchY < 200) {
                currentScreen = "MENU";
                console.log("🔄 Router: Redirected to Main Menu Matrix.");
                return true;
            }
            return false;
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            // Map responsive layout down to exact 1080x1920 canvas resolution coordinates
            const touchX = ((e.touches[0].clientX - rect.left) / rect.width) * 1080;
            const touchY = ((e.touches[0].clientY - rect.top) / rect.height) * 1920;

            console.log(`🎯 Touch registered at X: ${Math.round(touchX)}, Y: ${Math.round(touchY)}`);

            // Route Sub-Page Back Navigation Actions First
            if (currentScreen !== "MENU" && currentScreen !== "COMBAT") {
                if (checkBackTap(touchX, touchY)) return;
            }

            if (currentScreen === "MENU") {
                // 1. CATETIC Header Logo Click Zone -> Blank Page #1
                if (touchX > 60 && touchX < 1020 && touchY > 160 && touchY < 430) {
                    currentScreen = "PAGE_1";
                    console.log("💎 Opened Blank Page #1 (System Core Data)");
                }
                
                // 2. Samurai Cat Avatar Hitbox (Left Coordinate Node) -> Blank Page #2
                else if (touchX > 30 && touchX < 450 && touchY > 650 && touchY < 1150) {
                    currentScreen = "PAGE_2";
                    console.log("⚔️ Opened Blank Page #2 (Samurai Profile)");
                }

                // 3. Ninja Cat Avatar Hitbox (Right Coordinate Node) -> Blank Page #3
                else if (touchX > 630 && touchX < 1050 && touchY > 650 && touchY < 1150) {
                    currentScreen = "PAGE_3";
                    console.log("🥷 Opened Blank Page #3 (Ninja Profile)");
                }
                
                // 4. Repositioned Start Button Region -> Cyberpunk Rooftop Arena
                else if (touchX > 220 && touchX < 860 && touchY > 1540 && touchY < 1880) {
                    currentScreen = "COMBAT";
                    console.log("🎮 Combat Initialized on Rooftop Environment.");
                }
            } 
            
            else if (currentScreen === "COMBAT") {
                // Return switch for development convenience
                if (touchY < 200) {
                    currentScreen = "MENU";
                } else if (touchY > 1400) {
                    console.log("💥 Executing raw attack combat buffer string.");
                }
            }
        });

        function drawLoop() {
            ctx.clearRect(0, 0, 1080, 1920);
            
            switch(currentScreen) {
                case "MENU":
                    if (menuImg.complete) {
                        ctx.drawImage(menuImg, 0, 0, 1080, 1920);
                    } else {
                        ctx.fillStyle = "#000";
                        ctx.fillRect(0, 0, 1080, 1920);
                        ctx.fillStyle = "#4ade80";
                        ctx.font = "bold 40px monospace";
                        ctx.fillText("[ SYNCING MENU GRAPHICS... ]", 260, 960);
                    }
                    break;

                case "PAGE_1":
                    ctx.fillStyle = "#0d0e12";
                    ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#4ade80";
                    ctx.font = "bold 40px monospace";
                    ctx.fillText("<- TAP TOP TO RETURN", 50, 100);
                    ctx.fillText("[ PAGE #1: SYSTEM LOGS ]", 250, 960);
                    break;

                case "PAGE_2":
                    ctx.fillStyle = "#14110f";
                    ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#f97316";
                    ctx.font = "bold 40px monospace";
                    ctx.fillText("<- TAP TOP TO RETURN", 50, 100);
                    ctx.fillText("[ PAGE #2: SAMURAI SPECS ]", 240, 960);
                    break;

                case "PAGE_3":
                    ctx.fillStyle = "#0f172a";
                    ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#38bdf8";
                    ctx.font = "bold 40px monospace";
                    ctx.fillText("<- TAP TOP TO RETURN", 50, 100);
                    ctx.fillText("[ PAGE #3: NINJA SPECS ]", 270, 960);
                    break;

                case "COMBAT":
                    if (combatImg.complete) {
                        ctx.drawImage(combatImg, 0, 0, 1080, 1920);
                        
                        // Thin dev tracker bar at top edge for testing back routing
                        ctx.fillStyle = "rgba(255, 255, 255, 0.03)";
                        ctx.fillRect(0, 0, 1080, 150);
                    } else {
                        ctx.fillStyle = "#000";
                        ctx.fillRect(0, 0, 1080, 1920);
                        ctx.fillStyle = "#ef4444";
                        ctx.font = "bold 40px monospace";
                        ctx.fillText("[ LOADING ROOFTOP MAP... ]", 260, 960);
                    }
                    break;
            }
            
            requestAnimationFrame(drawLoop);
        }
        drawLoop();
    </script>
</body>
</html>
