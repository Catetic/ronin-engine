<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: #000;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9 / 16;
            box-shadow: 0 0 20px rgba(0, 255, 70, 0.3);
        }
        #catVideo {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
        }
    </style>
</head>
<body>

    <video id="catVideo" loop playsinline src="1775353548457063.mp4"></video>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('catVideo');

    canvas.width = 1080;
    canvas.height = 1920;

    // --- SOUND ENGINE ---
    const bgMusic = new Audio('Intro_music.m4a');
    bgMusic.loop = true;
    let musicPlaying = false;

    function toggleMusicSystem() {
        if (musicPlaying) {
            bgMusic.pause();
            musicPlaying = false;
        } else {
            bgMusic.play().then(() => {
                musicPlaying = true;
            }).catch(e => console.log("Audio waiting for user gesture context interaction."));
        }
    }

    // --- ASSET FILE REGISTRY ---
    const images = {};
    const assetFiles = {
        menu: 'IMG_9002.png',       // 1. Main menu screen
        battle: 'IMG_9005.png',     // 3. Attack room scene
        glasses: 'IMG_8681.png',    // 4. Cat with black glasses
        lounge1: 'IMG_9053.png',    // 5. VIP Lounge 1
        qrCat: 'IMG_9049.png',      // 6. Cat with QR codes
        lounge2: 'IMG_9054.png',    // 7. VIP Lounge 2
        keypad: 'IMG_9058.png',     // 8. Copper Keypad Door
        gameroom: 'IMG_9044.png',    // 9. Secret Game Room
        secretroom: 'IMG_9188.png',    // 10. Secret room 
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(assetFiles).length;
    
    for (let key in assetFiles) {
        images[key] = new Image();
        images[key].src = assetFiles[key];
        images[key].onload = () => {
            loadedCount++;
            if (loadedCount === totalAssets) {
                requestAnimationFrame(gameLoop);
            }
        };
    }

    // --- SYSTEM STORAGE STATES ---
    let gameState = "MENU"; 
    let toastMessage = "";
    let toastTimer = 0;
    let inputCode = "";
    const masterPassword = "7777777";
    let typeProgress = 0;      // Tracks how many letters have typed out
    let lastTypeTime = 0;      // Tracks the speed of the typing effect
    const rulesText = [
        "Hello Neo...",
        "THE CATETIC SIMULATION IS UNSTABLE.",
        "",
        "--- CHOOSE YOUR ALIGNMENT ---",
        "🔵 SAMURAI CAT (LEFT): THE BLUE PILL PATH.",
        "   FIGHT FOR FREEDOM WITH ONE FAST ATTACK.",
        "   SURPASS 6 CLICKS PER SECOND TO BREAK OUT.",
        "",
        "🔴 NINJA CAT (RIGHT): THE RED PILL TRAP.",
        "   RIGGED BY THE ARCHITECT. CHOOSING THIS",
        "   SIDE LEADS TO COMPLETE CRASH.",
        "",
        "WARNING: ONCE 'DRINK WATER' IS PRESSED,",
        "THE SYSTEM WILL INJECT 150 BPM CHAOS.",
        "THERE IS NO WAY BACK.",
        "",
        "-> TAP ANYWHERE TO EXIT TERMINAL _"
    ];

    // --- ENGINE CORE RENDERING LOOP ---
    function gameLoop() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === "MENU") {
            ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);
            
            // Fixed layout alignment and size for the RULES button text
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 40px 'Courier New', monospace";
            ctx.textAlign = "left";
            ctx.fillText("RULES", 50, 1470);
            
            // CATETIC Music Toggle Status Overlay Text
            ctx.fillStyle = musicPlaying ? "rgba(0, 255, 70, 0.8)" : "rgba(255, 26, 26, 0.8)";
            ctx.font = "bold 40px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(musicPlaying ? " 🟢 " : " 🛑 ", 970, 1470);
            ctx.textAlign = "start";
        } 
        else if (gameState === "RULES") {
            // 1. Clear with terminal black background
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Set the matrix style
            ctx.fillStyle = "#00ff46";
            ctx.font = "47px 'Courier New', Courier, monospace";
            ctx.textAlign = "left";

       // 3. if(gameState === "RULES") {
    // 1. HARD TRACKING FIX: Ensure trackers exist and stay relevant
    if (typeof window.typeProgress === 'undefined' || !window.lastTypeTime) {
        window.typeProgress = 0;
        window.lastTypeTime = Date.now();
    }

    // 2. Reference the original global lore vault array
    // (Ensure rulesText array lines 105-123 remains defined above your gameLoop)
    let fullTextString = rulesText.join("\n");

    // 3. Robust Increment logic
    let currentTime = Date.now();
    if (currentTime - window.lastTypeTime > 30) {
        if (window.typeProgress < fullTextString.length) {
            window.typeProgress++;
        }
        window.lastTypeTime = currentTime; 
    }

    // 4. Render text - Explicit styling to bypass Safari bugs
    ctx.fillStyle = "#00ff46";
    ctx.font = "bold 22px Courier New, monospace"; 
    ctx.textBaseline = "top"; 

    // Safety fallback
    let displayProgress = window.typeProgress > 0 ? window.typeProgress : 1;
    let currentSlice = fullTextString.substring(0, displayProgress);
    let linesToDraw = currentSlice.split("\n");

    let startY = 80; // Adjusted up slightly to fit your full immersive lore text comfortably
    let lineHeight = 35; // Compacted slightly so the long text doesn't flow off the iPhone screen
    for (let i = 0; i < linesToDraw.length; i++) {
        ctx.fillText(linesToDraw[i], 30, startY + (i * lineHeight));
    }


    // 5. Matrix Smile (Kept exactly as seen in your image since it works!)
    ctx.strokeStyle = "#00ff46"; 
    ctx.lineWidth = 6;           
    ctx.lineCap = "round";

    // Left Eye
    ctx.beginPath();
    ctx.moveTo(canvas.width * 0.35, canvas.height * 0.72);
    ctx.lineTo(canvas.width * 0.42, canvas.height * 0.72);
    ctx.stroke();

    // Right Eye
    ctx.beginPath();
    ctx.moveTo(canvas.width * 0.58, canvas.height * 0.72);
    ctx.lineTo(canvas.width * 0.65, canvas.height * 0.72);
    ctx.stroke();

    // Smile Mouth
    ctx.beginPath();
    let centerX = canvas.width * 0.5;
    let centerY = canvas.height * 0.75;
    let radius = canvas.width * 0.15; 
    ctx.moveTo(centerX + radius, centerY); 
    ctx.arc(centerX, centerY, radius, 0, Math.PI, false);
    ctx.stroke();
     }
       
       }
        else if (gameState === "BATTLE") {
            ctx.drawImage(images.battle, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "GLASSES_CAT") {
            ctx.drawImage(images.glasses, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP_LOUNGE_1") {
            ctx.drawImage(images.lounge1, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "QR_CAT") {
            ctx.drawImage(images.qrCat, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP_LOUNGE_2") {
            ctx.drawImage(images.lounge2, 0, 0, canvas.width, canvas.height);
        } 
            //     // --- 8. COPPER KEYPAD RENDER ENGINE (IMG_9058) ---
    else if (gameState === "KEYPAD") {
        ctx.drawImage(images.keypad, 0, 0, 1080, 1920);

        // Render Configuration - Perfect Size & Positioning
        ctx.font = "bold 56px 'Courier New', monospace"; 
        ctx.textAlign = "center";
        ctx.fillStyle = "#ffb834"; 

                if (inputCode.length === 0) {
            ctx.fillText("CLOSED", 680, 240);
           } else {
            ctx.fillText(inputCode, 680, 240);
        
    } } // <--- Keeps the Keypad drawing enclosed
          else if (gameState === "SECRET_ROOM") {
        ctx.drawImage(images.secretroom, 0, 0, canvas.width, canvas.height);
       }
        else if (gameState === "GAME_ROOM") {
        ctx.drawImage(images.gameroom, 0, 0, canvas.width, canvas.height);
        }

        // Clipboardsu notification confirmation alert
        if (toastTimer > 0) {
            ctx.fillStyle = "rgba(0, 255, 70, 0.9)";
            ctx.fillRect(240, 80, 600, 100);
            ctx.fillStyle = "#000000";
            ctx.font = "bold 32px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(toastMessage, 540, 142);
            ctx.textAlign = "start";
            toastTimer--;
        }

        requestAnimationFrame(gameLoop);
    }

    // --- HARDWARE RECT BOUNDING TOUCH INTERACTION SENSORS ---
    canvas.addEventListener('click', function(e) {
        // Auto-run music player context on initial interaction step
        if (!musicPlaying && gameState === "MENU") {
            bgMusic.play().then(() => { musicPlaying = true; }).catch(e => {});
        }

        const rect = canvas.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * canvas.width;
        const clickY = ((e.clientY - rect.top) / rect.height) * canvas.height;

        console.log("Touch Intercept Matrix -> State: " + gameState + " | X: " + Math.floor(clickX) + " Y: " + Math.floor(clickY));

        // 1 & 2. MAIN MENU OVERLAYS
        if (gameState === "MENU") {
            // 🟢🛑 Button Header Frame Bounds to toggle soundtrack playback loops
            if (clickX > 750 && clickX < 1060 && clickY > 1400 && clickY < 1520) {
                toggleMusicSystem();
                return;
            }
            // Fine-tuned green RULES text link region
            if (clickX > 20 && clickX < 240 && clickY > 1400 && clickY < 1520) {
                window.typeProgress = 0;  // Reset animation tracker cleanly
                gameState = "RULES";
                return;
            }
            // Big red START action center button collider
            if (clickX > 240 && clickX < 840 && clickY > 1300 && clickY < 1650) {
                gameState = "BATTLE";
                return;
            }

            // Click detector for the secret link
       if (!window.hasClickSetup) {
        window.hasClickSetup = true;
        canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        // Change these numbers to match your button area (X, Y, Width, Height)
        if (x > 50 && x < 250 && y > 100 && y < 200) {
            window.open('blank.html', '_blank');
        }
        });
        }
        } 
        
        // 2. TERMINAL INSTRUCTIONS WINDOW
        else if (gameState === "RULES") {
            gameState = "MENU";
        } 
        
        // 3. PLAY/ATTACK ROOM (IMG_9005)
        else if (gameState === "BATTLE") {
            // Pressing green "ATTACK" floor tile advances to Black Glasses Cat
            if (clickX > 100 && clickX < 980 && clickY > 1350 && clickY < 1650) {
                gameState = "GLASSES_CAT";
            }
        } 
        
        // 4. BLACK GLASSES GLITCH SCREEN (IMG_8681)
        else if (gameState === "GLASSES_CAT") {
            gameState = "QR_CAT"; // Shift directly onto QR codes map layout
        } 
        
        // 6. CAT WITH QR CODES INTERACTION GRID (IMG_9049)
        else if (gameState === "QR_CAT") {
            // Left QR Button Collider (Bitcoin Portal)
            if (clickX > 20 && clickX < 490 && clickY > 700 && clickY < 1200) {
                triggerWalletToast("BTC", "bc1q92lt3zqcsfmyjasjchgqxp4w2khmqwse9c5f59");
            } 
            // Right QR Button Collider (Ethereum Portal)
            else if (clickX > 520 && clickX < 1060 && clickY > 700 && clickY < 1200) {
                triggerWalletToast("ETH", "0x8238da0AEB879164a7B53607E527350f0D1F1990");
            } 
            // Tap matrix code background walls to step down onto video system layer path
            else {
                gameState = "RAINY_VIDEO";
                canvas.style.display = "none";
                video.style.display = "block";
                video.play();
            }
        } 
        
        // 5. VIP LOUNGE 1 (IMG_9053)
        else if (gameState === "VIP_LOUNGE_1") {
            // Wide horizontal footer link to propose layout toasts
            if (clickY > 1450 && clickY < 1900) {
                gameState = "VIP_LOUNGE_2";
            }
        } 
        
        // 7. VIP LOUNGE 2 SCREEN INTERACTION ROUTER (IMG_9054)
        else if (gameState === "VIP_LOUNGE_2") {
            // Split Action Row mapping
            if (clickX > 50 && clickX < 500 && clickY > 1550 && clickY < 1900) {
                gameState = "MENU"; // "RETURN TO REALITY" button drops back out safely
            }
            else if (clickX > 540 && clickX < 1030 && clickY > 1550 && clickY < 1900) {
                gameState = "KEYPAD"; // "PROPOSE TOAST" button launches encryption pad lock
                inputCode = ""; 
            }
        } 
                  // 8. COPPER KEYPAD DOOR AUTHENTICATOR INTERFACE (IMG_9058)
        else if (gameState === "KEYPAD") {

            // 🔘 THE BIG SILVER BUTTON (Escape Hatch / Clue Toggle)
            if (clickX > 30 && clickX < 250 && clickY > 1050 && clickY < 1350) {
                if (inputCode === "[next home]") {
                    inputCode = ""; 
                    gameState = "MENU"; // Redirects straight back to your home menu scene
                } else {
                    inputCode = "[next home]";
                }
                return;
            } 
            IMG_9053)
        else if (gameState === "VIP_LOUNGE_1") {
            // Wide horizontal footer link to propose layout toasts
            if (clickY > 1450 && clickY < 1900) {
                gameState = "VIP_LOUNGE_2";

            // 🔢 NUMERIC INPUT GRID (Shifted UP to perfectly catch your finger taps!)
            if (clickY > 540 && clickY < 1460) {
                
                // Instantly wipe notification phrases when starting to type a fresh number sequence
                if (inputCode === "CLOSED" || inputCode === "ERROR" || inputCode === "[next home]" || inputCode === "COOOOL") {
                    inputCode = ""; 
                }

                // ROW 1: Buttons 1, 2, 3 (Shifted UP)
                if (clickY > 540 && clickY < 730) {
                    if (clickX > 320 && clickX < 500 && inputCode.length < 9) registerKey("1");
                    else if (clickX > 530 && clickX < 710 && inputCode.length < 9) registerKey("2");
                    else if (clickX > 740 && clickX < 920 && inputCode.length < 9) registerKey("3");
                }
                // ROW 2: Buttons 4, 5, 6 (Shifted UP)
                else if (clickY > 760 && clickY < 950) {
                    if (clickX > 320 && clickX < 500 && inputCode.length < 9) registerKey("4");
                    else if (clickX > 530 && clickX < 710 && inputCode.length < 9) registerKey("5");
                    else if (clickX > 740 && clickX < 920 && inputCode.length < 9) registerKey("6");
                }
                // ROW 3: Buttons 7, 8, 9 (Shifted UP - matches your 8 target perfectly now!)
                else if (clickY > 980 && clickY < 1170) {
                    if (clickX > 320 && clickX < 500 && inputCode.length < 9) registerKey("7");
                    else if (clickX > 530 && clickX < 710 && inputCode.length < 9) registerKey("8");
                    else if (clickX > 740 && clickX < 920 && inputCode.length < 9) registerKey("9");
                }
                // ROW 4: Buttons 0, K, C (Shifted UP)
                else if (clickY > 1200 && clickY < 1390) {
                    if (clickX > 320 && clickX < 500 && inputCode.length < 9) registerKey("0");
                    
                    // 🔑 'K' KEY: THE 49 RONINS VALIDATION (Exactly 7 sevens)
                    else if (clickX > 530 && clickX < 710) {
                        if (inputCode === "7777777") { 
                            gameState = "SECRET_ROOM"; // Kyōso master successfully steps out!
                        } else {
                            inputCode = "ERROR"; 
                        }
                    }
                    
                    // 🧼 'C' KEY: COOOOL CLEAR TRICK 😹
                    else if (clickX > 740 && clickX < 920) {
                        inputCode = "COOOOL"; 
                    }
                }
            }
        }
        
        // 9. UNLOCKED SECRET GAME ROOM (IMG_9044)
        else if (gameState === "GAME_ROOM") {
            gameState = "MENU"; // Resets back onto entry point safely
        }
    });

    // Handle background media display sequences cleanly
    video.addEventListener('click', function() {
        if (gameState === "RAINY_VIDEO") {
            video.pause();
            video.style.display = "none";
            canvas.style.display = "block";
            gameState = "GLASSES_CAT"; // Loop right back to the black glasses cat page sequence
        }
    });

    function triggerWalletToast(type, address) {
        navigator.clipboard.writeText(address).then(() => {
            toastMessage = type + " COPIED TO MATRIX";
            toastTimer = 120; 
            setTimeout(() => {
                gameState = "VIP_LOUNGE_1"; // Advance cleanly to Lounge Stage 1
            }, 1100);
        }).catch(err => {
            gameState = "VIP_LOUNGE_1"; 
        });
    }

    function registerKey(val) {
        if (val === "C") {
            inputCode = "";
        } else if (val === "K") {
            if (inputCode === masterPassword) {
                gameState = "GAME_ROOM"; // Code 7777777 successfully triggers Game Room entry!
            } else {
                inputCode = "ERROR";
                setTimeout(() => { inputCode = ""; }, 900);
            }
        } else { 
            if (inputCode === "ERROR" || inputCode.length >= 9) {
                inputCode = "";
            }
            inputCode += val;
        }
    }
</script>
</body>
</html>
