<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC: SECRET CHANNELS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #gameCanvas { width: 100vw; height: 100vh; object-fit: contain; background: #0a0a0c; display: block; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="1080" height="1920"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Extended State Matrix: "MENU", "TAP_FRENZY", "SPEAR_COMBO", "NINJA_COUNTER", "RIGGED_FAIL", "CATETIC_SECRET", "VS_BLANK", "NEO_BLANK", "SLEEP_BLANK"
        let gameState = "MENU";
        let selectedCharacter = "SAMURAI"; 
        let isMuted = false;
        let audioInitialized = false;
        
        // Multi-Tap Timers
        let lastSamuraiTapTime = 0;
        let lastNinjaTapTime = 0;
        
        let totalTaps = 0;
        let timeRemaining = 5;
        let countdownTicker = null;

        // Audio Elements
        const introTrack = new Audio('Intro_music.m4a');
        const battleTrack = new Audio('combat_theme.mp3'); 
        introTrack.loop = true;
        battleTrack.loop = true;

        // Graphic Elements
        const menuImg = new Image(); menuImg.src = 'IMG_9002.png';
        const secretImg = new Image(); secretImg.src = 'IMG_8681.png'; // Your uploaded secret pass graphic

        function initAudio() {
            if (audioInitialized) return;
            audioInitialized = true;
            manageAudioRouting();
        }

        function manageAudioRouting() {
            if (isMuted) {
                introTrack.pause();
                battleTrack.pause();
                return;
            }
            if (gameState === "MENU") {
                battleTrack.pause(); battleTrack.currentTime = 0;
                introTrack.play().catch(e => console.log("Audio waiting."));
            } 
            else if (gameState === "TAP_FRENZY") {
                introTrack.pause(); introTrack.currentTime = 0;
                battleTrack.play().catch(e => console.log("Combat track triggered."));
            }
        }

        function startMatch() {
            totalTaps = 0; timeRemaining = 5;
            gameState = "TAP_FRENZY";
            manageAudioRouting();

            countdownTicker = setInterval(() => {
                timeRemaining--;
                if (timeRemaining <= 0) {
                    clearInterval(countdownTicker);
                    if (selectedCharacter === "NINJA") {
                        gameState = "RIGGED_FAIL";
                    } else if (totalTaps / 5 >= 6) {
                        gameState = "SPEAR_COMBO";
                    } else {
                        gameState = "NINJA_COUNTER";
                    }
                    battleTrack.pause();
                    setTimeout(() => { gameState = "MENU"; manageAudioRouting(); }, 5000);
                }
            }, 1000);
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio(); 

            const rect = canvas.getBoundingClientRect();
            const touchX = ((e.touches[0].clientX - rect.left) / rect.width) * 1080;
            const touchY = ((e.touches[0].clientY - rect.top) / rect.height) * 1920;
            const now = Date.now();

            // GLOBAL RESET: Tapping any secret blank screen instantly routes back to Main Menu
            if (gameState === "CATETIC_SECRET" || gameState === "VS_BLANK" || gameState === "NEO_BLANK" || gameState === "SLEEP_BLANK") {
                gameState = "MENU";
                return;
            }

            if (gameState === "MENU") {
                // 1. SECRET: CATETIC Title Trap (Top Header Zone)
                if (touchY > 80 && touchY < 450 && touchX > 40 && touchX < 1040) {
                    gameState = "CATETIC_SECRET";
                    return;
                }

                // 2. SECRET: VS Center Trap (Middle corridor between cats)
                if (touchY > 800 && touchY < 1100 && touchX > 450 && touchX < 630) {
                    gameState = "VS_BLANK";
                    return;
                }

                // 3. START BUTTON
                if (touchY > 1280 && touchY < 1650 && touchX > 220 && touchX < 860) {
                    startMatch();
                    return;
                }

                // 4. MUTE HUD ICON CHECK
                if ((touchX > 0 && touchX < 200 && touchY > 1280 && touchY < 1600) || 
                    (touchX > 880 && touchX < 1080 && touchY > 1280 && touchY < 1600)) {
                    isMuted = !isMuted;
                    manageAudioRouting();
                    return;
                }

                // 5. CHOOSE SAMURAI ZONE & DOUBLE TAP DETECTION
                if (touchX > 0 && touchX < 480 && touchY > 600 && touchY < 1250) {
                    if (now - lastSamuraiTapTime < 300) {
                        gameState = "NEO_BLANK"; // Double tap pass triggered
                    } else {
                        selectedCharacter = "SAMURAI"; // Single tap choice locked
                    }
                    lastSamuraiTapTime = now;
                }
                
                // 6. CHOOSE NINJA ZONE & DOUBLE TAP DETECTION
                else if (touchX > 600 && touchX < 1080 && touchY > 600 && touchY < 1250) {
                    if (now - lastNinjaTapTime < 300) {
                        gameState = "SLEEP_BLANK"; // Double tap pass triggered
                    } else {
                        selectedCharacter = "NINJA"; // Single tap choice locked
                    }
                    lastNinjaTapTime = now;
                }
            } 
            else if (gameState === "TAP_FRENZY") {
                totalTaps++;
            }
        });

        function drawEngine() {
            ctx.clearRect(0, 0, 1080, 1920);

            switch(gameState) {
                case "MENU":
                    if (menuImg.complete) ctx.drawImage(menuImg, 0, 0, 1080, 1920);
                    
                    // Status Sound Ring Overlays
                    ctx.lineWidth = 10;
                    if (isMuted) {
                        ctx.strokeStyle = "#ef4444";
                        ctx.beginPath(); ctx.moveTo(40, 1370); ctx.lineTo(140, 1470); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(140, 1370); ctx.lineTo(40, 1470); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(940, 1370); ctx.lineTo(1040, 1470); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(1040, 1370); ctx.lineTo(940, 1470); ctx.stroke();
                    } else if (audioInitialized) {
                        ctx.strokeStyle = "#22c55e";
                        ctx.beginPath(); ctx.arc(90, 1420, 55, 0, Math.PI * 2); ctx.stroke();
                        ctx.beginPath(); ctx.arc(990, 1420, 55, 0, Math.PI * 2); ctx.stroke();
                    }

                    // Dynamic Neon Selection Indicators
                    ctx.lineWidth = 12;
                    if (selectedCharacter === "SAMURAI") {
                        ctx.strokeStyle = "rgba(59, 130, 246, 0.75)";
                        ctx.beginPath(); ctx.arc(240, 950, 220, 0, Math.PI * 2); ctx.stroke();
                    } else {
                        ctx.strokeStyle = "rgba(239, 68, 68, 0.75)";
                        ctx.beginPath(); ctx.arc(825, 950, 220, 0, Math.PI * 2); ctx.stroke();
                    }
                    break;

                case "CATETIC_SECRET":
                    if (secretImg.complete) {
                        ctx.drawImage(secretImg, 0, 0, 1080, 1920);
                    } else {
                        ctx.fillStyle = "#111"; ctx.fillRect(0, 0, 1080, 1920);
                        ctx.fillStyle = "#fff"; ctx.font = "40px sans-serif";
                        ctx.fillText("LOADING SECRET IMG_8681...", 300, 960);
                    }
                    break;

                case "VS_BLANK":
                    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#666"; ctx.font = "italic 50px sans-serif";
                    ctx.fillText("[ VS SECRET PATHWAY: BLANK ]", 240, 960);
                    break;

                case "NEO_BLANK":
                    ctx.fillStyle = "#020617"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#3b82f6"; ctx.font = "bold 60px monospace";
                    ctx.fillText("NEO EVOLUTION", 340, 900);
                    ctx.fillStyle = "#fff"; ctx.font = "35px monospace";
                    ctx.fillText("[ TAP TO RETURN TO SIMULATION ]", 240, 1050);
                    break;

                case "SLEEP_BLANK":
                    ctx.fillStyle = "#0f0505"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#ef4444"; ctx.font = "bold 60px monospace";
                    ctx.fillText("DEEP SIMULATION SLEEP", 240, 900);
                    ctx.fillStyle = "#fff"; ctx.font = "35px monospace";
                    ctx.fillText("[ TAP TO WAKE UP ]", 360, 1050);
                    break;

                case "TAP_FRENZY":
                    ctx.fillStyle = "#020617"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 55px monospace";
                    ctx.fillText(`TIME: ${timeRemaining}s`, 100, 200);
                    ctx.fillText(`TOTAL CLICKS: ${totalTaps}`, 520, 200);
                    break;

                case "SPEAR_COMBO":
                    ctx.fillStyle = "#064e3b"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#34d399"; ctx.font = "bold 65px sans-serif";
                    ctx.fillText("⚡ BLUE PILL VICTORY ⚡", 180, 960);
                    break;

                case "NINJA_COUNTER":
                    ctx.fillStyle = "#450a0a"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#ef4444"; ctx.font = "bold 70px sans-serif";
                    ctx.fillText("❌ TOO SLOW ❌", 310, 960);
                    break;

                case "RIGGED_FAIL":
                    ctx.fillStyle = "#1c0505"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#ef4444"; ctx.font = "bold 60px sans-serif";
                    ctx.fillText("🔴 TRAPPED IN THE MATRIX 🔴", 120, 960);
                    break;
            }

            requestAnimationFrame(drawEngine);
        }
        drawEngine();
    </script>
</body>
</html>
