<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catetic</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --dark-bg: #0d0d0d;
            --panel-border: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background Video Layer */
        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
        }

        /* Main Interface Layout */
        #game-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            height: 100%;
            max-height: 800px;
            display: grid;
            grid-template-columns: 1fr 350px;
            grid-template-rows: 1fr 120px;
            gap: 20px;
            padding: 20px;
        }

        /* Visual Stage (Left Area) */
        .stage-area {
            grid-column: 1;
            grid-row: 1;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid var(--panel-border);
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .display-frame {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            display: none;
            transition: all 0.3s ease;
        }

        .display-frame.active {
            display: block;
        }

        /* Sidebar / Controls (Right Area) */
        .sidebar {
            grid-column: 2;
            grid-row: 1 / span 2;
            background: rgba(15, 15, 15, 0.9);
            border: 2px solid var(--panel-border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
        }

        .panel-view {
            width: 100%;
            border: 1px solid #222;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
        }

        #padlock-panel-view {
            height: 200px;
        }

        #lounge-view {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .panel-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bottom Console Control Row */
        .console-bar {
            grid-column: 1;
            grid-row: 2;
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid var(--panel-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        /* Interactive Catetic Trigger Button */
        #catetic-btn {
            background: #111;
            color: var(--matrix-green);
            border: 2px solid var(--matrix-green);
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
            transition: all 0.2s ease;
        }

        #catetic-btn:hover {
            background: var(--matrix-green);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
        }

        #catetic-btn:active {
            transform: scale(0.98);
        }

        /* Status Display readouts */
        .status-box {
            color: #666;
            font-size: 0.85rem;
        }
        .status-box span {
            color: var(--matrix-green);
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video-player" playsinline loop muted></video>
    </div>

    <main id="game-container">
        
        <section class="stage-area">
            <img id="cat-display" class="display-frame" src="" alt="Main Display Asset">
        </section>

        <aside class="sidebar">
            <div id="padlock-panel-view" class="panel-view">
                <img id="padlock-img" class="panel-img" src="" alt="Padlock Panel">
            </div>
            
            <div id="lounge-view" class="panel-view">
                <img id="lounge-img" class="panel-img" src="" alt="Lounge State">
            </div>
        </aside>

        <footer class="console-bar">
            <div class="status-box">SYSTEM_STATE: <span id="system-status">READY</span></div>
            <button id="catetic-btn">CATETIC</button>
            <div class="status-box">PRESS_COUNT: <span id="press-counter">0</span></div>
        </footer>

    </main>

    <script>
        // Asset Mapping Context
        const ASSETS = {
            rainyCat:          '1775353548457063.mp4',
            mainCatSunglasses: 'IMG_9058.png',
            catQrCodes:        'IMG_9053.png',
            loungeRest:        'IMG_9048.png',
            loungeSalute:      'IMG_9049.png',
            padlockPanel:      'IMG_9044.png',
            victorySamurai:    'IMG_8681.png'
        };

        // State Machine Cache
        let cateticPressCount = 0;

        // DOM Handle Queries
        const elements = {
            videoPlayer:  document.getElementById('video-player'),
            catDisplay:   document.getElementById('cat-display'),
            padlockImg:   document.getElementById('padlock-img'),
            loungeImg:    document.getElementById('lounge-img'),
            cateticBtn:   document.getElementById('catetic-btn'),
            pressCounter: document.getElementById('press-counter'),
            systemStatus: document.getElementById('system-status')
        };

        // Initialize engine environments and background dependencies
        function initEngine() {
            // Set basic static structures
            if (elements.padlockImg) elements.padlockImg.src = ASSETS.padlockPanel;
            if (elements.loungeImg)  elements.loungeImg.src  = ASSETS.loungeRest;

            // Instantiate video tracking asset loop
            if (elements.videoPlayer) {
                elements.videoPlayer.src = ASSETS.rainyCat;
                elements.videoPlayer.play().catch(() => {
                    console.log("Autoplay context waiting for hardware interaction acknowledgment.");
                });
            }
        }

        // Handle structural switching on user asset engagement
        function processCateticTrigger() {
            cateticPressCount++;
            if (elements.pressCounter) elements.pressCounter.textContent = cateticPressCount;

            if (cateticPressCount === 1) {
                // First press: Render static visual state with sunglasses asset
                if (elements.catDisplay) {
                    elements.catDisplay.src = ASSETS.mainCatSunglasses;
                    elements.catDisplay.classList.add('active');
                }
                if (elements.systemStatus) elements.systemStatus.textContent = "INITIAL_STATE_ACTIVE";

            } else if (cateticPressCount === 2) {
                // Second press: Swap inline canvas frame to matrix qr variation
                if (elements.catDisplay) {
                    elements.catDisplay.src = ASSETS.catQrCodes;
                }
                if (elements.systemStatus) elements.systemStatus.textContent = "MATRIX_QR_LOCKED";
                
                // Agent interaction sequence execution sequence trigger mockup
                executeLoungeSequence();
            }
        }

        // Runtime State Trigger Utilities
        function executeLoungeSequence() {
            // Change Lounge state to toast position
            if (elements.loungeImg) elements.loungeImg.src = ASSETS.loungeSalute;
            
            // Timeout to reset back to baseline resting layout or push terminal parameters
            setTimeout(() => {
                if (elements.loungeImg) elements.loungeImg.src = ASSETS.loungeRest;
            }, 3000);
        }

        function triggerGameVictory() {
            if (elements.catDisplay) {
                elements.catDisplay.src = ASSETS.victorySamurai;
                elements.catDisplay.classList.add('active');
            }
            if (elements.systemStatus) elements.systemStatus.textContent = "VICTORY_ACHIEVED";
        }

        // Event Attachment Pipeline
        if (elements.cateticBtn) {
            elements.cateticBtn.addEventListener('click', processCateticTrigger);
        }

        document.addEventListener('DOMContentLoaded', initEngine);
    </script>
</body>
</html>
