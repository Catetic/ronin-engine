<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC: SHOWDOWN DECK</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #gameCanvas { width: 100vw; height: 100vh; object-fit: contain; background: #0a0a0c; display: block; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="1080" height="1920"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // State Engine Matrix
        let gameState = "MENU"; 
        let selectedCharacter = "SAMURAI"; 
        let isMuted = false;
        let audioInitialized = false;
        
        // Double-Tap Timers & Typewriter Indexes
        let lastSamuraiTapTime = 0;
        let lastNinjaTapTime = 0;
        let terminalTicker = 0;
        let visibleLetters = 0;
        
        let totalTaps = 0;
        let timeRemaining = 5;
        let countdownTicker = null;

        // Terminal Script Block
        const rulesString = [
            "Hello Neo... 😹",
            "",
            "THE CATETIC SIMULATION IS UNSTABLE.",
            "",
            "--- CHOOSE YOUR ALIGNMENT ---",
            "🔵 SAMURAI CAT (LEFT): THE BLUE PILL PATH.",
            "   FIGHT FOR FREEDOM WITH ONE FAST ATTACK BUTTON.",
            "   SURPASS 6 CLICKS PER SECOND TO BREAK OUT.",
            "",
            "🔴 NINJA CAT (RIGHT): THE RED PILL TRAP.",
            "   RIGGED BY THE ARCHITECT.",
            "   CHOOSING THIS SIDE LEADS TO COMPLETE CRASH.",
            "",
            "WARNING: ONCE 'DRINK WATER' IS PRESSED,",
            "THE SYSTEM WILL INJECT 150 BPM CHAOS.",
            "THERE IS NO WAY BACK.",
            "",
            "-> TAP ANYWHERE TO EXIT TERMINAL _"
        ];

        const fullRulesText = rulesString.join("\n");

        // Audio Elements
        const introTrack = new Audio('Intro_music.m4a');
        const battleTrack = new Audio('combat_theme.mp3'); 
        introTrack.loop = true;
        battleTrack.loop = true;

        // Image Assets
        const menuImg = new Image(); menuImg.src = 'IMG_9002.png';
        const secretImg = new Image(); secretImg.src = 'IMG_8681.png';

        function initAudio() {
            if (audioInitialized) return;
            audioInitialized = true;
            manageAudioRouting();
        }

        function manageAudioRouting() {
            if (isMuted) {
                introTrack.pause();
                battleTrack.pause();
                return;
            }
            if (gameState === "MENU" || gameState === "RULES_SCREEN") {
                battleTrack.pause(); battleTrack.currentTime = 0;
                introTrack.play().catch(e => console.log("Audio pipeline locked."));
            } 
            else if (gameState === "TAP_FRENZY") {
                introTrack.pause(); introTrack.currentTime = 0;
                battleTrack.play().catch(e => console.log("Battle loop missing or buffering."));
            }
        }

        function startMatch() {
            totalTaps = 0; timeRemaining = 5;
            gameState = "TAP_FRENZY";
            manageAudioRouting();

            countdownTicker = setInterval(() => {
                timeRemaining--;
                if (timeRemaining <= 0) {
                    clearInterval(countdownTicker);
                    if (selectedCharacter === "NINJA") {
                        gameState = "RIGGED_FAIL";
                    } else if (totalTaps / 5 >= 6) {
                        gameState = "SPEAR_COMBO";
                    } else {
                        gameState = "NINJA_COUNTER";
                    }
                    battleTrack.pause();
                    setTimeout(() => { gameState = "MENU"; manageAudioRouting(); }, 5000);
                }
            }, 1000);
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio(); 

            const rect = canvas.getBoundingClientRect();
            const touchX = ((e.touches[0].clientX - rect.left) / rect.width) * 1080;
            const touchY = ((e.touches[0].clientY - rect.top) / rect.height) * 1920;
            const now = Date.now();

            // Exit backdoors on click
            if (gameState === "RULES_SCREEN" || gameState === "CATETIC_SECRET" || gameState === "VS_BLANK" || gameState === "NEO_BLANK" || gameState === "SLEEP_BLANK") {
                gameState = "MENU";
                return;
            }

            if (gameState === "MENU") {
                // 1. TOP LOGO TRAP (CATETIC Text Hidden Door)
                if (touchY > 80 && touchY < 450 && touchX > 40 && touchX < 1040) {
                    gameState = "CATETIC_SECRET";
                    return;
                }

                // 2. CENTER VS TRAP
                if (touchY > 800 && touchY < 1100 && touchX > 450 && touchX < 630) {
                    gameState = "VS_BLANK";
                    return;
                }

                // 3. RULES PORTAL (Calibrated Left Side under Samurai)
                if (touchX > 0 && touchX < 240 && touchY > 1280 && touchY < 1600) {
                    gameState = "RULES_SCREEN";
                    visibleLetters = 0; 
                    return;
                }

                // 4. AUDIO MUTE PORTAL (Calibrated Right Side under Ninja)
                if (touchX > 880 && touchX < 1080 && touchY > 1280 && touchY < 1600) {
                    isMuted = !isMuted;
                    manageAudioRouting();
                    return;
                }

                // 5. HYDRATION ENGINE START GATE
                if (touchY > 1280 && touchY < 1650 && touchX > 240 && touchX < 840) {
                    startMatch();
                    return;
                }

                // 6. BLUE SAMURAI FACE ATTRIBUTES & DOUBLE TAPPING
                if (touchX > 0 && touchX < 480 && touchY > 600 && touchY < 1250) {
                    if (now - lastSamuraiTapTime < 300) {
                        gameState = "NEO_BLANK";
                    } else {
                        selectedCharacter = "SAMURAI";
                    }
                    lastSamuraiTapTime = now;
                }
                
                // 7. RED NINJA FACE ATTRIBUTES & DOUBLE TAPPING
                else if (touchX > 600 && touchX < 1080 && touchY > 600 && touchY < 1250) {
                    if (now - lastNinjaTapTime < 300) {
                        gameState = "SLEEP_BLANK";
                    } else {
                        selectedCharacter = "NINJA";
                    }
                    lastNinjaTapTime = now;
                }
            } 
            else if (gameState === "TAP_FRENZY") {
                totalTaps++;
            }
        });

        function drawEngine() {
            ctx.clearRect(0, 0, 1080, 1920);

            switch(gameState) {
                case "MENU":
                    if (menuImg.complete) ctx.drawImage(menuImg, 0, 0, 1080, 1920);
                    
                    // Left HUD Overlay: Rules text under Samurai Side
                    ctx.fillStyle = "#22c55e"; ctx.font = "bold 45px monospace";
                    ctx.shadowColor = "#22c55e"; ctx.shadowBlur = 15;
                    ctx.fillText("RULES", 45, 1435);
                    ctx.shadowBlur = 0; 

                    // Right HUD Overlay: Clean indicator nodes under Ninja side
                    ctx.lineWidth = 6;
                    if (isMuted) {
                        ctx.strokeStyle = "#ef4444";
                        ctx.beginPath(); ctx.moveTo(950, 1420); ctx.lineTo(1030, 1420); ctx.stroke();
                    } else if (audioInitialized) {
                        ctx.strokeStyle = "#22c55e";
                        ctx.beginPath(); ctx.arc(990, 1420, 20, 0, Math.PI * 2); ctx.stroke();
                    }

                    // --- STYLIZED CYBERPUNK TARGETING BRACKETS ---
                    ctx.lineWidth = 8;
                    ctx.shadowBlur = 25;

                    if (selectedCharacter === "SAMURAI") {
                        ctx.strokeStyle = "#3b82f6"; ctx.shadowColor = "#3b82f6";
                        let x = 60, y = 740, w = 390, h = 390, len = 60;
                        ctx.beginPath(); ctx.moveTo(x + len, y); ctx.lineTo(x, y); ctx.lineTo(x, y + len); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x + w - len, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + len); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x, y + h - len); ctx.lineTo(x, y + h); ctx.lineTo(x + len, y + h); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x + w - len, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - len); ctx.stroke();
                    } else {
                        ctx.strokeStyle = "#ef4444"; ctx.shadowColor = "#ef4444";
                        let x = 635, y = 740, w = 390, h = 390, len = 60;
                        ctx.beginPath(); ctx.moveTo(x + len, y); ctx.lineTo(x, y); ctx.lineTo(x, y + len); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x + w - len, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + len); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x, y + h - len); ctx.lineTo(x, y + h); ctx.lineTo(x + len, y + h); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x + w - len, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - len); ctx.stroke();
                    }
                    ctx.shadowBlur = 0; 

                    // "DRINK WATER" Arcade Overlay
                    ctx.fillStyle = "#22c55e"; ctx.font = "bold 32px monospace";
                    ctx.shadowColor = "#22c55e"; ctx.shadowBlur = 10;
                    ctx.fillText("DRINK WATER", 435, 1530);
                    ctx.shadowBlur = 0;
                    break;

                case "RULES_SCREEN":
                    ctx.fillStyle = "#030712"; ctx.fillRect(0, 0, 1080, 1920);
                    
                    terminalTicker++;
                    if (terminalTicker % 2 === 0 && visibleLetters < fullRulesText.length) {
                        visibleLetters++;
                    }

                    // Swapped target fill style to glowing matrix green hex code
                    ctx.fillStyle = "#22c55e"; 
                    ctx.font = "38px monospace";
                    ctx.shadowColor = "#22c55e"; ctx.shadowBlur = 5;
                    
                    let lines = fullRulesText.slice(0, visibleLetters).split("\n");
                    let startY = 250;
                    for (let i = 0; i < lines.length; i++) {
                        ctx.fillText(lines[i], 80, startY + (i * 65));
                    }
                    ctx.shadowBlur = 0;

                    // Hacker terminal smile injection
                    if (visibleLetters >= fullRulesText.length) {
                        ctx.strokeStyle = "#22c55e"; ctx.lineWidth = 12;
                        ctx.shadowColor = "#22c55e"; ctx.shadowBlur = 20;
                        
                        ctx.beginPath(); ctx.moveTo(460, 1500); ctx.lineTo(520, 1500); ctx.stroke(); // Left eye
                        ctx.beginPath(); ctx.moveTo(580, 1500); ctx.lineTo(640, 1500); ctx.stroke(); // Right eye
                        ctx.beginPath(); ctx.arc(550, 1520, 140, 0.1 * Math.PI, 0.9 * Math.PI, false); ctx.stroke(); // Mouth
                        
                        ctx.shadowBlur = 0;
                    }
                    break;

                case "CATETIC_SECRET":
                    if (secretImg.complete) ctx.drawImage(secretImg, 0, 0, 1080, 1920);
                    break;

                case "VS_BLANK":
                    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#666"; ctx.font = "italic 50px sans-serif";
                    ctx.fillText("[ VS SECRET PATHWAY: BLANK ]", 240, 960);
                    break;

                case "NEO_BLANK":
                    ctx.fillStyle = "#020617"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#3b82f6"; ctx.font = "bold 60px monospace";
                    ctx.fillText("NEO EVOLUTION", 340, 900);
                    ctx.fillStyle = "#fff"; ctx.font = "35px monospace";
                    ctx.fillText("[ TAP TO RETURN TO SIMULATION ]", 240, 1050);
                    break;

                case "SLEEP_BLANK":
                    ctx.fillStyle = "#0f0505"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#ef4444"; ctx.font = "bold 60px monospace";
                    ctx.fillText("DEEP SIMULATION SLEEP", 240, 900);
                    ctx.fillStyle = "#fff"; ctx.font = "35px monospace";
                    ctx.fillText("[ TAP TO WAKE UP ]", 360, 1050);
                    break;

                case "TAP_FRENZY":
                    ctx.fillStyle = "#020617"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 55px monospace";
                    ctx.fillText(`TIME: ${timeRemaining}s`, 100, 200);
                    ctx.fillText(`TOTAL CLICKS: ${totalTaps}`, 520, 200);
                    break;

                case "SPEAR_COMBO":
                    ctx.fillStyle = "#064e3b"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#34d399"; ctx.font = "bold 65px sans-serif";
                    ctx.fillText("⚡ BLUE PILL VICTORY ⚡", 180, 960);
                    break;

                case "NINJA_COUNTER":
                    ctx.fillStyle = "#450a0a"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#ef4444"; ctx.font = "bold 70px sans-serif";
                    ctx.fillText("❌ TOO SLOW ❌", 310, 960);
                    break;

                case "RIGGED_FAIL":
                    ctx.fillStyle = "#1c0505"; ctx.fillRect(0, 0, 1080, 1920);
                    ctx.fillStyle = "#ef4444"; ctx.font = "bold 60px sans-serif";
                    ctx.fillText("🔴 TRAPPED IN THE MATRIX 🔴", 120, 960);
                    break;
            }

            requestAnimationFrame(drawEngine);
        }
        drawEngine();
    </script>
</body>
</html>
