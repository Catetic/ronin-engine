<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATETIC OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: #000;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9 / 16;
            box-shadow: 0 0 20px rgba(0, 255, 70, 0.3);
        }
        #catVideo {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
        }
    </style>
</head>
<body>

    <video id="catVideo" loop playsinline src="1775353548457063.mp4"></video>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('catVideo');

    canvas.width = 1080;
    canvas.height = 1920;

    // --- AUDIO SYSTEM LOOP ---
    const bgMusic = new Audio('Intro_music.m4a');
    bgMusic.loop = true;
    let musicPlaying = false;

    function startAudioEngine() {
        if (!musicPlaying) {
            bgMusic.play().then(() => {
                musicPlaying = true;
            }).catch(e => console.log("Audio pipeline initializing on user physical interaction."));
        }
    }

    // --- CHRONOLOGICAL REPOSITORY ASSETS ---
    const images = {};
    const assetFiles = {
        menu: 'IMG_9002.png',       // 1. Samurai vs Ninja Main Split Screen
        battle: 'IMG_9005.png',     // 3. Samurai and Ninja Battle Arena View
        glasses: 'IMG_8681.png',    // 4. Glitch Screen: Cat with Glasses 
        lounge1: 'IMG_9053.png',    // 5. VIP Lounge Phase 1 (Hood Down / Glass Down)
        qrCat: 'IMG_9049.png',      // 6. Matrix Cat Node with Dual QR Portals
        lounge2: 'IMG_9054.png',    // 7. VIP Lounge Phase 2 (Raised Glass Salute Button)
        keypad: 'IMG_9058.png',     // 8. Copper Electrical Keypad Vault Panel
        gameroom: 'IMG_9044.png'    // 9. Unlocked Secret Cyber Game Room
    };

    let loadedCount = 0;
    const totalAssets = Object.keys(assetFiles).length;
    
    for (let key in assetFiles) {
        images[key] = new Image();
        images[key].src = assetFiles[key];
        images[key].onload = () => {
            loadedCount++;
            if (loadedCount === totalAssets) {
                requestAnimationFrame(gameLoop);
            }
        };
    }

    // --- SYSTEM MEMORY VARIABLES ---
    let gameState = "MENU"; 
    let toastMessage = "";
    let toastTimer = 0;
    let inputCode = "";
    const masterPassword = "7777777";

    const rulesText = [
        "THE CATETIC SIMULATION IS UNSTABLE.",
        "",
        "--- CHOOSE YOUR ALIGNMENT ---",
        "🔵 SAMURAI CAT (LEFT): THE BLUE PILL PATH.",
        "   FIGHT FOR FREEDOM WITH ONE FAST ATTACK.",
        "   SURPASS 6 CLICKS PER SECOND TO BREAK OUT.",
        "",
        "🔴 NINJA CAT (RIGHT): THE RED PILL TRAP.",
        "   RIGGED BY THE ARCHITECT. CHOOSING THIS",
        "   SIDE LEADS TO COMPLETE CRASH.",
        "",
        "WARNING: ONCE 'DRINK WATER' IS PRESSED,",
        "THE SYSTEM WILL INJECT 150 BPM CHAOS.",
        "THERE IS NO WAY BACK.",
        "",
        "-> TAP ANYWHERE TO EXIT TERMINAL _"
    ];

    // --- RENDER REFRESH LOOPS ---
    function gameLoop() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === "MENU") {
            ctx.drawImage(images.menu, 0, 0, canvas.width, canvas.height);
            
            // 2. Custom code-rendered green matrix "RULES" string right under the Samurai block
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 34px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText("RULES", 220, 1480);
            ctx.textAlign = "start";
        } 
        else if (gameState === "RULES") {
            ctx.fillStyle = "#010802";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#00ff46";
            ctx.font = "bold 36px 'Courier New', monospace";
            ctx.fillText("Hello Neo... 🤖", 80, 150);
            
            ctx.font = "30px 'Courier New', monospace";
            let startY = 250;
            for (let i = 0; i < rulesText.length; i++) {
                ctx.fillText(rulesText[i], 80, startY + (i * 45));
            }
            
            ctx.strokeStyle = "#00ff46";
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(540, 1400, 150, 0, Math.PI, false);
            ctx.stroke();
            ctx.fillRect(440, 1250, 40, 15);
            ctx.fillRect(600, 1250, 40, 15);
        } 
        else if (gameState === "BATTLE") {
            ctx.drawImage(images.battle, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "GLASSES_CAT") {
            ctx.drawImage(images.glasses, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP_LOUNGE_1") {
            ctx.drawImage(images.lounge1, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "QR_CAT") {
            ctx.drawImage(images.qrCat, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "VIP_LOUNGE_2") {
            ctx.drawImage(images.lounge2, 0, 0, canvas.width, canvas.height);
        } 
        else if (gameState === "KEYPAD") {
            ctx.drawImage(images.keypad, 0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#ff1a1a";
            ctx.font = "bold 65px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(inputCode || "CLOSED", 540, 320); 
            ctx.textAlign = "start"; 
        } 
        else if (gameState === "GAME_ROOM") {
            ctx.drawImage(images.gameroom, 0, 0, canvas.width, canvas.height);
        }

        // Action Notifications Toast
        if (toastTimer > 0) {
            ctx.fillStyle = "rgba(0, 255, 70, 0.85)";
            ctx.fillRect(240, 80, 600, 100);
            ctx.fillStyle = "#000000";
            ctx.font = "bold 32px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText(toastMessage, 540, 142);
            ctx.textAlign = "start";
            toastTimer--;
        }

        requestAnimationFrame(gameLoop);
    }

    // --- HARDWARE COORDINATE DETECTION MATRIX ---
    canvas.addEventListener('click', function(e) {
        startAudioEngine(); 

        const rect = canvas.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * canvas.width;
        const clickY = ((e.clientY - rect.top) / rect.height) * canvas.height;

        console.log("Input Event Matrix -> State: " + gameState + " | X: " + Math.floor(clickX) + " Y: " + Math.floor(clickY));

        // 1 & 2. MAIN MENU (IMG_9002) INPUT ROUTING
        if (gameState === "MENU") {
            // Rules text click bounding box zone (Under Samurai cat on left hand side)
            if (clickX > 50 && clickX < 380 && clickY > 1400 && clickY < 1600) {
                gameState = "RULES";
                return;
            }
            // Start Action button tracking box -> Progresses straight to Battle Arena (IMG_9005)
            if (clickX > 240 && clickX < 840 && clickY > 1300 && clickY < 1650) {
                gameState = "BATTLE";
                return;
            }
        } 
        
        // 2. TERMINAL INSTRUCTIONS WINDOW
        else if (gameState === "RULES") {
            gameState = "MENU"; // Tap anywhere returns back to main lobby selection
        } 
        
        // 3. COMBAT BATTLE ARENA PAGE (IMG_9005)
        else if (gameState === "BATTLE") {
            // Tapping on the active arena map pushes the timeline forward to the glasses cat glitch framework
            gameState = "GLASSES_CAT";
        } 
        
        // 4. MORPHEUS GLASSES CAT ROOM (IMG_8681)
        else if (gameState === "GLASSES_CAT") {
            // Tapping this page advances forward down into VIP Lounge Phase 1
            gameState = "VIP_LOUNGE_1";
        } 
        
        // 5. VIP LOUNGE PHASE 1 (IMG_9053)
        else if (gameState === "VIP_LOUNGE_1") {
            // Broad bounding zone over the bottom footer bar button to open the Matrix QR code grid
            if (clickY > 1450 && clickY < 1900) {
                gameState = "QR_CAT";
            }
        } 
        
        // 6. MATRIX QR SCANNER PORTAL NODE (IMG_9049)
        else if (gameState === "QR_CAT") {
            // BTC Wallet Area Hit check
            if (clickX > 20 && clickX < 490 && clickY > 700 && clickY < 1200) {
                triggerWalletToast("BTC", "bc1q92lt3zqcsfmyjasjchgqxp4w2khmqwse9c5f59");
            } 
            // ETH Wallet Area Hit check
            else if (clickX > 520 && clickX < 1060 && clickY > 700 && clickY < 1200) {
                triggerWalletToast("ETH", "0x8238da0AEB879164a7B53607E527350f0D1F1990");
            } 
            // Tap the Matrix background text wall to drop into the background video room alternative sequence
            else {
                gameState = "RAINY_VIDEO";
                canvas.style.display = "none";
                video.style.display = "block";
                video.play();
            }
        } 
        
        // 7. VIP LOUNGE PHASE 2 (IMG_9054)
        else if (gameState === "VIP_LOUNGE_2") {
            // Split button interactions
            if (clickX > 50 && clickX < 500 && clickY > 1550 && clickY < 1900) {
                gameState = "MENU"; // Quit back to reality line
            }
            else if (clickX > 540 && clickX < 1030 && clickY > 1550 && clickY < 1900) {
                gameState = "KEYPAD"; // Pivot onto Electrical Copper Circuit Keypad System
                inputCode = ""; 
            }
        } 
        
        // 8. SECURE VAULT DECRYPTION CORE HARDWARE (IMG_9058)
        else if (gameState === "KEYPAD") {
            if (clickY > 450 && clickY < 1250) {
                if (clickY > 480 && clickY < 640) {
                    if (clickX > 250 && clickX < 450) registerKey("1");
                    else if (clickX > 460 && clickX < 640) registerKey("2");
                    else if (clickX > 650 && clickX < 850) registerKey("3");
                }
                else if (clickY > 670 && clickY < 830) {
                    if (clickX > 250 && clickX < 450) registerKey("4");
                    else if (clickX > 460 && clickX < 640) registerKey("5");
                    else if (clickX > 650 && clickX < 850) registerKey("6");
                }
                else if (clickY > 860 && clickY < 1020) {
                    if (clickX > 250 && clickX < 450) registerKey("7");
                    else if (clickX > 460 && clickX < 640) registerKey("8");
                    else if (clickX > 650 && clickX < 850) registerKey("9");
                }
                else if (clickY > 1050 && clickY < 1210) {
                    if (clickX > 250 && clickX < 450) registerKey("0");
                    else if (clickX > 460 && clickX < 640) registerKey("K"); // Submit entry validation
                    else if (clickX > 650 && clickX < 850) registerKey("C"); // Wipe input memory clean
                }
            }
            else if (clickY > 1400 && clickY < 1650) {
                gameState = "MENU";
            }
        }
        
        // 9. UNLOCKED SECRET CYBER GAME ROOM (IMG_9044)
        else if (gameState === "GAME_ROOM") {
            gameState = "MENU"; // Loops cleanly back around to start screen frame
        }
    });

    // Close video layout views securely
    video.addEventListener('click', function() {
        if (gameState === "RAINY_VIDEO") {
            video.pause();
            video.style.display = "none";
            canvas.style.display = "block";
            gameState = "VIP_LOUNGE_1"; // Securely drop right back into story sequence
        }
    });

    function triggerWalletToast(type, address) {
        navigator.clipboard.writeText(address).then(() => {
            toastMessage = type + " COPIED TO MATRIX";
            toastTimer = 120; 
            setTimeout(() => {
                gameState = "VIP_LOUNGE_2"; // Step seamlessly forward to lounge stage 2
            }, 1100);
        }).catch(err => {
            gameState = "VIP_LOUNGE_2"; 
        });
    }

    function registerKey(val) {
        if (val === "C") {
            inputCode = "";
        } else if (val === "K") {
            if (inputCode === masterPassword) {
                gameState = "GAME_ROOM"; // Success triggers Game Room page sequence unlock!
            } else {
                inputCode = "ERROR";
                setTimeout(() => { inputCode = ""; }, 900);
            }
        } else {
            if (inputCode === "ERROR" || inputCode.length >= 7) {
                inputCode = "";
            }
            inputCode += val;
        }
    }
</script>
</body>
</html>
